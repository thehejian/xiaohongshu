<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1792 1024">
<defs>
<linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#0D0D1A"/>
  <stop offset="100%" stop-color="#0A0A14"/>
</linearGradient>
<linearGradient id="accentG" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#8B5CF6"/>
  <stop offset="100%" stop-color="#3B82F6"/>
</linearGradient>
<linearGradient id="accentG2" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%" stop-color="#8B5CF6"/>
  <stop offset="100%" stop-color="#06B6D4"/>
</linearGradient>
<filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
  <feGaussianBlur stdDeviation="8" result="blur"/>
  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="shadow">
  <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
</filter>
<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
  <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A1A2E" stroke-width="0.5"/>
</pattern>
</defs>
<rect width="1792" height="1024" fill="url(#bgG)"/><rect width="1792" height="1024" fill="url(#grid)"/><circle cx="89.60000000000001" cy="51.2" r="215.04" fill="#8B5CF6" opacity="0.08"/><circle cx="1702.3999999999999" cy="972.8" r="268.8" fill="#3B82F6" opacity="0.06"/>

<text x="896" y="260" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="52" font-weight="300" fill="#A1A1AA" letter-spacing="4">OPEN</text>

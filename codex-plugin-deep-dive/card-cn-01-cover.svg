<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FAF7F2"/><stop offset="100%" stop-color="#F5F0E8"/></linearGradient><linearGradient id="bg-dark" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0B1027"/><stop offset="100%" stop-color="#151B3D"/></linearGradient></defs>
<rect width="1080" height="1080" fill="url(#bg)"/>

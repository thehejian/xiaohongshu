<!doctype html>
<html lang="en" data-accent="lemon-green">
<head>
  <meta charset="utf-8">
  <title>Codex Plugin - Code Reviewer</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap">
  <style>
    :root, [data-accent="lemon-green"] {
      --paper: #0B1027;
      --ink: #F8FAFC;
      --grey-1: #1E293B;
      --grey-2: #334155;
      --grey-3: #94A3B8;
      --accent: #C5E803;
      --accent-on: #0B1027;
    }
    :root {
      --sans: "Inter", "Helvetica Neue", Helvetica, sans-serif;
      --mono: "IBM Plex Mono", ui-monospace, "SF Mono", Consolas, monospace;
    }
    *,*::before,*::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      font-family: var(--sans);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      padding: 32px;
    }
    .poster {
      position: relative;
      width: 1080px;
      height: 1080px;
      background: var(--paper);
      color: var(--ink);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .content {
      text-align: center;
      padding: 60px;
    }
    .h-xl {
      font-family: var(--sans);
      font-weight: 300;
      font-size: 100px;
      line-height: 1.08;
      letter-spacing: -.01em;
      margin: 0;
      color: var(--ink);
    }
    .accent-bar {
      width: 120px;
      height: 6px;
      background: var(--accent);
      margin: 0 auto 40px;
    }
  </style>
</head>
<body>
  <!-- Card 7: Code Reviewer EN -->
  <section class="poster" id="en-reviewer">
    <div class="content">
      <div class="accent-bar"></div>
      <h1 class="h-xl">CODE REVIEWER<br>Bug Hunter</h1>
    </div>
  </section>
</body>
</html>

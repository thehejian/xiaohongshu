<!doctype html>
<html lang="zh-CN" data-accent="ikb">
<head>
  <meta charset="utf-8">
  <title>Codex插件深度解析 - 中文卡片</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Noto+Sans+SC:wght@200;300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
  <style>
    /* Swiss International — Light Mode (Chinese) */
    :root, [data-accent="ikb"] {
      --paper: #FAF7F2;
      --ink: #1E293B;
      --grey-1: #F0EDE6;
      --grey-2: #D4D1CA;
      --grey-3: #737373;
      --accent: #002FA7;
      --accent-on: #ffffff;
    }
    :root {
      --sans: "Inter", "Helvetica Neue", Helvetica, "Noto Sans SC", -apple-system, "PingFang SC", "Microsoft YaHei UI", sans-serif;
      --sans-zh: "Noto Sans SC", -apple-system, "PingFang SC", "Microsoft YaHei UI", "Inter", sans-serif;
      --mono: "IBM Plex Mono", ui-monospace, "SF Mono", Consolas, monospace;
    }
    *,*::before,*::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      font-family: var(--sans);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      padding: 32px;
    }
    .poster {
      position: relative;
      width: 1080px;
      height: 1080px;
      background: var(--paper);
      color: var(--ink);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .content {
      text-align: center;
      padding: 60px;
    }
    .h-hero {
      font-family: var(--sans);
      font-weight: 200;
      font-size: 180px;
      line-height: 1.02;
      letter-spacing: -.02em;
      margin: 0;
      color: var(--ink);
    }
    .h-statement {
      font-family: var(--sans);
      font-weight: 200;
      font-size: 140px;
      line-height: 1.05;
      letter-spacing: -.015em;
      margin: 0;
      color: var(--ink);
    }
    .h-xl {
      font-family: var(--sans);
      font-weight: 300;
      font-size: 100px;
      line-height: 1.08;
      letter-spacing: -.01em;
      margin: 0;
      color: var(--ink);
    }
    .accent-bar {
      width: 120px;
      height: 6px;
      background: var(--accent);
      margin: 0 auto 40px;
    }
  </style>
</head>
<body>
  <!-- Card 1: Cover -->
  <section class="poster" id="cn-cover">
    <div class="content">
      <div class="accent-bar"></div>
      <h1 class="h-statement">Codex插件<br>深度解析</h1>
    </div>
  </section>
</body>
</html>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="10 24" height="10 24" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0B15"/>
      <stop offset="50%" stop-color="#12121F"/>
      <stop offset="100%" stop-color="#0A0A12"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#22D3EE" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bgGrad)"/>
  <rect width="1024" height="1024" fill="url(#grid)"/>

  <!-- Ambient glow -->
  <circle cx="512" cy="400" r="400" fill="#22D3EE" opacity="0.03"/>
  <circle cx="800" cy="200" r="200" fill="#8B5CF6" opacity="0.05"/>

  <!-- Logo: Pi symbol with gradient -->
  <g transform="translate(200, 180)">
    <!-- P shape -->
    <path fill="url(#cyanGrad)" d="M0 0 H250 V150 H100 V250 H250 V400 H0 Z M100 100 V150 H250 V100 Z"/>
    <!-- i dot -->
    <rect x="300" y="0" width="80" height="80" rx="8" fill="#22D3EE"/>
  </g>

  <!-- Main title -->
  <text x="512" y="720" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="700" fill="#F8FAFC">π Pi Agent</text>
  <text x="512" y="770" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#94A3B8">Make it yours</text>

  <!-- Install command -->
  <g transform="translate(100, 880)">
    <rect x="0" y="0" width="824" height="56" rx="8" fill="#1E1B4B" stroke="#22D3EE" stroke-width="1" opacity="0.5"/>
    <text x="24" y="38" font-family="SF Mono, Monaco, monospace" font-size="22" fill="#22D3EE">$ curl -fsSL https://pi. dev/install. sh | sh</text>
  </g>

  <!-- Hash tags -->
  <text x="512" y="980" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#64748B">#AI编程 #CodingAgent #Pi #开源</text>
</svg>
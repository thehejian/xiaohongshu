<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a0a;font-family:'Inter',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
  .card{width:1024px;height:1024px;background:radial-gradient(circle at 50% 30%,#1a1f2e 0%,#0B1027 70%,#060814 100%);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center}
  .accent-dot{position:absolute;top:48px;right:48px;width:12px;height:12px;border-radius:50%;background:#00D4FF}
  .kicker{font-family:'IBM Plex Mono',monospace;font-size:16px;letter-spacing:0.3em;text-transform:uppercase;color:#5F6D78;margin-bottom:24px}
  .num{font-family:'Inter',sans-serif;font-size:180px;font-weight:900;line-height:1;color:#00D4FF;letter-spacing:-0.04em}
  .title{font-family:'Inter',sans-serif;font-size:48px;font-weight:700;line-height:1.3;color:#F5F0E8;text-align:center;margin-top:12px;letter-spacing:0.02em}
  .benchmarks{display:flex;flex-wrap:wrap;justify-content:center;gap:10px 18px;margin-top:48px}
  .bench{font-family:'IBM Plex Mono',monospace;font-size:14px;color:#8899AA;padding:8px 16px;border:1px solid rgba(0,212,255,0.2);border-radius:4px}
  .bench.highlight{background:#00D4FF;color:#060814;border-color:#00D4FF;font-weight:600}
  .subline{position:absolute;bottom:64px;left:64px;right:64px;display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid rgba(95,109,120,0.3);padding-top:24px}
  .subline .left{font-family:'IBM Plex Mono',monospace;font-size:13px;color:#5F6D78;letter-spacing:0.2em;text-transform:uppercase}
  .subline .right{font-family:'Inter',sans-serif;font-size:18px;color:#5F6D78;font-weight:400}
</style>
</head>
<body>
<div class="card">
  <div class="accent-dot"></div>
  <p class="kicker">LEADERBOARD DOMINANCE</p>
  <div class="num">7</div>
  <h1 class="title">LEADERBOARDS.<br>#1.</h1>
  <div class="benchmarks">
    <span class="bench highlight">VANTAGE</span>
    <span class="bench highlight">TAR</span>
    <span class="bench highlight">Artificial Analysis</span>
    <span class="bench highlight">Physics-IQ</span>
    <span class="bench highlight">R-Bench</span>
    <span class="bench highlight">PAI-Bench</span>
    <span class="bench">+ 1 more</span>
  </div>
  <div class="subline">
    <span class="left">OPEN WEIGHTS · HUGGING FACE</span>
    <span class="right">Not ranking. Domination.</span>
  </div>
</div>
</body>
</html>

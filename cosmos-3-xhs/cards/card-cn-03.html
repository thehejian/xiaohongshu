<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;900&family=Noto+Sans+SC:wght@200;300;400;500;600;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#1a1a1a;font-family:'Inter','Noto Sans SC',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
  .card{width:1024px;height:1024px;background:linear-gradient(180deg,#FAF7F2 0%,#F5F0E8 100%);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center}
  .accent-bar{position:absolute;top:0;left:0;right:0;height:8px;background:#002FA7}
  .kicker{font-family:'IBM Plex Mono',monospace;font-size:18px;letter-spacing:0.25em;text-transform:uppercase;color:#737373;margin-bottom:24px}
  .num{font-family:'Inter','Noto Sans SC',sans-serif;font-size:160px;font-weight:900;line-height:1;color:#002FA7;letter-spacing:-0.04em}
  .title{font-family:'Noto Sans SC','Inter',sans-serif;font-size:56px;font-weight:700;line-height:1.3;color:#0A0A0A;text-align:center;margin-top:16px}
  .benchmarks{display:flex;flex-wrap:wrap;justify-content:center;gap:12px 24px;margin-top:48px}
  .bench{font-family:'IBM Plex Mono',monospace;font-size:16px;color:#737373;padding:8px 16px;border:1px solid #D4D4D2;border-radius:4px}
  .bench.highlight{background:#002FA7;color:#fff;border-color:#002FA7}
  .subline{position:absolute;bottom:64px;left:64px;right:64px;display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid #D4D4D2;padding-top:24px}
  .subline .left{font-family:'IBM Plex Mono',monospace;font-size:14px;color:#737373;letter-spacing:0.15em;text-transform:uppercase}
  .subline .right{font-family:'Noto Sans SC',sans-serif;font-size:20px;color:#737373;font-weight:500}
</style>
</head>
<body>
<div class="card">
  <div class="accent-bar"></div>
  <p class="kicker">BENCHMARK DOMINANCE</p>
  <div class="num">7</div>
  <h1 class="title">项榜单第一</h1>
  <div class="benchmarks">
    <span class="bench highlight">VANTAGE-Bench</span>
    <span class="bench highlight">TAR</span>
    <span class="bench highlight">Artificial Analysis</span>
    <span class="bench highlight">Physics-IQ</span>
    <span class="bench highlight">R-Bench</span>
    <span class="bench highlight">PAI-Bench</span>
    <span class="bench">+ 1 more</span>
  </div>
  <div class="subline">
    <span class="left">OPEN WEIGHTS LEADERBOARD</span>
    <span class="right">这不是刷榜，是碾压</span>
  </div>
</div>
</body>
</html>

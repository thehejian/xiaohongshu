<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
<defs><linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FAF7F2"/><stop offset="100%" stop-color="#F3F0E8"/></linearGradient></defs>
<rect width="1024" height="1024" fill="url(#bgG)"/><circle cx="81.92" cy="81.92" r="60" fill="#E0F2FE" opacity="0.4"/><circle cx="942.08" cy="122.88" r="50" fill="#EDE9FE" opacity="0.4"/><circle cx="81.92" cy="901.12" r="70" fill="#DBEAFE" opacity="0.3"/><circle cx="942.08" cy="798.72" r="80" fill="#FFEDD5" opacity="0.3"/>

<text x="512" y="90" text-anchor="middle" font-family="ui-sans-serif,-apple-system,sans-serif" font-size="38" font-weight="800" fill="#1E293B">🔑 Codex OAuth 保留</text>
<text x="512" y="130" text-anchor="middle" font-family="ui-sans-serif,-apple-system,sans-serif" font-size="22" fill="#64748B">切换供应商不掉登录</text>

<g transform="translate(62, 180)">
  <rect x="0" y="0" width="900" height="60" rx="14" fill="#FEE2E2"/>
  <text x="450" y="36" text-anchor="middle" font-family="ui-sans-serif,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#EF4444">以前：第三方 Key 写入 auth.json → 覆盖官方 OAuth</text>
</g>

<g transform="translate(62, 270)">
  <rect x="0" y="0" width="900" height="280" rx="18" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="2"/>
  <text x="450" y="50" text-anchor="middle" font-family="ui-sans-serif,-apple-system,sans-serif" font-size="28" font-weight="700" fill="#0EA5E9">v3.16.1 改进</text>
  
  <g transform="translate(40, 90)">
    <circle cx="14" cy="14" r="10" fill="#10B981"/>
    <text x="40" y="20" font-family="ui-sans-serif,-apple-system,sans-serif" font-size="20" font-weight="600" fill="#1E293B">第三方 token → config.toml</text>
  </g>
  <g transform="translate(40, 135)">
    <circle cx="14" cy="14" r="10" fill="#10B981"/>
    <text x="40" y="20" font-family="ui-sans-serif,-apple-system,sans-serif" font-size="20" font-weight="600" fill="#1E293B">官方 OAuth 继续留在 auth.json</text>
  </g>
  <g transform="translate(40, 180)">
    <circle cx="14" cy="14" r="10" fill="#10B981"/>
    <text x="40" y="20" font-family="ui-sans-serif,-apple-system,sans-serif" font-size="20" font-weight="600" fill="#1E293B">远程操作 / 官方插件不受影响</text>
  </g>
  <g transform="translate(40, 225)">
    <circle cx="14" cy="14" r="10" fill="#10B981"/>
    <text x="40" y="20" font-family="ui-sans-serif,-apple-system,sans-serif" font-size="20" font-weight="600" fill="#1E293B">默认关闭，兼容旧行为</text>
  </g>
</g>

<g transform="translate(62, 580)">
  <rect x="0" y="0" width="900" height="60" rx="14" fill="#E0F2FE"/>
  <text x="450" y="36" text-anchor="middle" font-family="ui-sans-serif,-apple-system,sans-serif" font-size="20" font-weight="600" fill="#0EA5E9">设置 → Codex 应用增强 → 开启官方认证保留</text>
</g>

<text x="512" y="720" text-anchor="middle" font-family="ui-sans-serif,-apple-system,sans-serif" font-size="18" fill="#64748B">同时保留官方订阅权益 + 第三方供应商价格优势</text>

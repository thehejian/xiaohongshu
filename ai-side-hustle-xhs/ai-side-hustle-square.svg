    <text x="422" y="579" font-size="16" font-weight="600" fill="#EC4899" font-family="PingFang SC, Microsoft YaHei, sans-serif">10-198元/张</text>
    <rect x="530" y="555" width="100" height="38" rx="19" fill="#1A1A2E" opacity="0.06"/>
    <text x="580" y="579" font-size="15" text-anchor="middle" fill="#4A4A68" font-family="PingFang SC, Microsoft YaHei, sans-serif">适合新手</text>
    
    
    <rect x="700" y="380" width="280" height="260" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="700" y="380" width="8" height="260" rx="4" fill="#F59E0B"/>
    <circle cx="756" cy="438" r="22" fill="#F59E0B" opacity="0.12"/>
    <text x="756" y="446" font-size="22" text-anchor="middle" fill="#F59E0B" font-family="PingFang SC, Microsoft YaHei, sans-serif">📊</text>
    <text x="796" y="442" font-size="26" font-weight="700" fill="#1A1A2E" font-family="PingFang SC, Microsoft YaHei, sans-serif">AI做PPT</text>
    <text x="730" y="480" font-size="18" fill="#4A4A68" font-family="PingFang SC, Microsoft YaHei, sans-serif">汇报/课件/路演</text>
    <rect x="730" y="555" width="140" height="38" rx="19" fill="#F59E0B" opacity="0.1"/>
    <text x="742" y="579" font-size="16" font-weight="600" fill="#F59E0B" font-family="PingFang SC, Microsoft YaHei, sans-serif">100-500元/套</text>
    <rect x="850" y="555" width="100" height="38" rx="19" fill="#1A1A2E" opacity="0.06"/>
    <text x="900" y="579" font-size="15" text-anchor="middle" fill="#4A4A68" font-family="PingFang SC, Microsoft YaHei, sans-serif">适合新手</text>
    

    <!-- Bottom note -->
    <rect x="60" y="680" width="904" height="80" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
    <text x="100" y="715" font-size="20" fill="#4A4A68" font-family="PingFang SC, Microsoft YaHei, sans-serif">门槛低 · 靠量积累 · 月入2k-5k不难</text>
    <text x="100" y="748" font-size="18" fill="#8888A0" font-family="PingFang SC, Microsoft YaHei, sans-serif">从最顺手的开始，别贪多</text>

    <!-- Footer -->
    <text x="60" y="820" font-size="16" fill="#8888A0" font-family="PingFang SC, Microsoft YaHei, sans-serif">#AI副业 #搞钱 #自由职业 #AI写稿 #AI绘画 #AI PPT</text>

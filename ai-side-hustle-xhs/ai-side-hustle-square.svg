    <text x="90" y="480" font-size="18" fill="#4A4A68" font-family="PingFang SC, Microsoft YaHei, sans-serif">小红书/公众号代写</text>
    <rect x="90" y="555" width="140" height="38" rx="19" fill="#6366F1" opacity="0.1"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
    <rect width="1024" height="1024" fill="#FAF7F2"/>
    <defs>
      
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1E1E3C" flood-opacity="0.06"/>
    </filter>
    
    </defs>

    <!-- Top bar -->
    <rect width="1024" height="140" fill="#EC4899" opacity="0.08"/>
    <text x="60" y="70" font-size="22" font-weight="600" fill="#EC4899" font-family="PingFang SC, Microsoft YaHei, sans-serif">PATH 02</text>
    <text x="60" y="110" font-size="48" font-weight="800" fill="#1A1A2E" font-family="PingFang SC, Microsoft YaHei, sans-serif">AI做头像定制</text>

    <!-- Main icon -->
    <circle cx="120" cy="260" r="70" fill="#EC4899" opacity="0.12"/>
    <text x="120" y="280" font-size="56" text-anchor="middle" font-family="Apple Color Emoji, sans-serif">🎨</text>

    <!-- Description -->
    <text x="230" y="240" font-size="26" font-weight="600" fill="#1A1A2E" font-family="PingFang SC, Microsoft YaHei, sans-serif">头像/壁纸/表情包全套</text>
    <text x="230" y="280" font-size="20" fill="#4A4A68" font-family="PingFang SC, Microsoft YaHei, sans-serif">接单平台：闲鱼 / 小红书 / 朋友圈</text>

    <!-- Price box -->
    <rect x="60" y="330" width="300" height="90" rx="16" fill="#EC4899" opacity="0.1"/>
    <text x="80" y="365" font-size="18" fill="#EC4899" font-family="PingFang SC, Microsoft YaHei, sans-serif">定价参考</text>
    <text x="80" y="405" font-size="36" font-weight="700" fill="#EC4899" font-family="PingFang SC, Microsoft YaHei, sans-serif">10-198元/张</text>

    <!-- Tips section -->
    <rect x="60" y="460" width="904" height="280" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
    <text x="100" y="510" font-size="24" font-weight="700" fill="#1A1A2E" font-family="PingFang SC, Microsoft YaHei, sans-serif">💡 关键技巧</text>

    <!-- Tips lines -->
    <text x="100" y="600" font-size="22" fill="#4A4A68" font-family="PingFang SC, Microsoft YaHei, sans-serif">• Midjourney v6出图，风格统一</text><text x="100" y="655" font-size="22" fill="#4A4A68" font-family="PingFang SC, Microsoft YaHei, sans-serif">• prompt模板化，5分钟4张备选</text><text x="100" y="710" font-size="22" fill="#4A4A68" font-family="PingFang SC, Microsoft YaHei, sans-serif">• 表情包要表情丰富、动作夸张</text><text x="100" y="765" font-size="22" fill="#4A4A68" font-family="PingFang SC, Microsoft YaHei, sans-serif">• 小红书搜"AI头像定制"需求大</text>

    <!-- Bottom note -->
    <rect x="60" y="780" width="904" height="70" rx="14" fill="#1A1A2E" opacity="0.04"/>
    <text x="100" y="822" font-size="20" fill="#4A4A68" font-family="PingFang SC, Microsoft YaHei, sans-serif">适合：审美在线 · prompt熟练 · 出图快</text>


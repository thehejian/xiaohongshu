<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
    <rect width="1024" height="1024" fill="#FAF7F2"/>
    <defs>
      
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1E1E3C" flood-opacity="0.06"/>
    </filter>
    
    </defs>

    <!-- Top bar -->
    <rect width="1024" height="140" fill="#6366F1" opacity="0.08"/>
    <text x="60" y="70" font-size="22" font-weight="600" fill="#6366F1" font-family="PingFang SC, Microsoft YaHei, sans-serif">PATH 01</text>
    <text x="60" y="110" font-size="48" font-weight="800" fill="#1A1A2E" font-family="PingFang SC, Microsoft YaHei, sans-serif">AI写稿接单</text>

    <!-- Main icon -->
    <circle cx="120" cy="340" r="70" fill="#6366F1" opacity="0.12"/>
    <text x="120" y="360" font-size="56" text-anchor="middle" font-family="Apple Color Emoji, sans-serif">✍️</text>

    <!-- Description -->
    <text x="230" y="250" font-size="26" font-weight="600" fill="#1A1A2E" font-family="PingFang SC, Microsoft YaHei, sans-serif">小红书/公众号/知乎代写</text>
    <text x="230" y="290" font-size="20" fill="#4A4A68" font-family="PingFang SC, Microsoft YaHei, sans-serif">接单平台：闲鱼 / 小红书 / 朋友圈</text>

    <!-- Price box -->
    <rect x="60" y="370" width="300" height="90" rx="16" fill="#6366F1" opacity="0.1"/>
    <text x="80" y="405" font-size="18" fill="#6366F1" font-family="PingFang SC, Microsoft YaHei, sans-serif">定价参考</text>
    <text x="80" y="445" font-size="36" font-weight="700" fill="#6366F1" font-family="PingFang SC, Microsoft YaHei, sans-serif">50-300元/篇</text>

    <!-- Tips section -->
    <rect x="60" y="500" width="904" height="280" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
    <text x="100" y="550" font-size="24" font-weight="700" fill="#1A1A2E" font-family="PingFang SC, Microsoft YaHei, sans-serif">💡 关键技巧</text>

    <!-- Tips lines -->
    <text x="100" y="630" font-size="22" fill="#4A4A68" font-family="PingFang SC, Microsoft YaHei, sans-serif">• 用Claude写初稿，人工润色</text><text x="100" y="685" font-size="22" fill="#4A4A68" font-family="PingFang SC, Microsoft YaHei, sans-serif">• 客户要的是结果，不是过程</text><text x="100" y="740" font-size="22" fill="#4A4A68" font-family="PingFang SC, Microsoft YaHei, sans-serif">• 效率翻倍，一天能接3-5单</text><text x="100" y="795" font-size="22" fill="#4A4A68" font-family="PingFang SC, Microsoft YaHei, sans-serif">• 前期靠量，后期靠复购</text>

    <!-- Bottom note -->
    <rect x="60" y="820" width="904" height="70" rx="14" fill="#1A1A2E" opacity="0.04"/>
    <text x="100" y="862" font-size="20" fill="#4A4A68" font-family="PingFang SC, Microsoft YaHei, sans-serif">适合：审美在线 · prompt熟练 · 出图快</text>

    <!-- Footer -->
    <text x="60" y="930" font-size="15" fill="#8888A0" font-family="PingFang SC, Microsoft YaHei, sans-serif">#AI副业 #搞钱 #自由职业</text>
  </svg>
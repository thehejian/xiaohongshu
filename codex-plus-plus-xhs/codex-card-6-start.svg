<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="100%" stop-color="#F5F0E8"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#1E293B" flood-opacity="0.06"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>

  <text x="400" y="55" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#1E293B">🚀 三步上手</text>
  <text x="400" y="90" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="18" fill="#64748B">从 0 到 Codex++ 不到 5 分钟</text>

  <!-- Step 1 -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="700" height="80" rx="18" fill="#FFFFFF" filter="url(#shadow)"/>
    <circle cx="55" cy="40" r="26" fill="#3B82F6"/>
    <text x="55" y="47" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#FFF">1</text>
    <text x="105" y="48" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1E293B">下载安装包</text>
    <text x="350" y="48" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="17" fill="#64748B">去 GitHub Releases 选平台</text>
  </g>

  <!-- Step 2 -->
  <g transform="translate(50, 260)">
    <rect x="0" y="0" width="700" height="80" rx="18" fill="#FFFFFF" filter="url(#shadow)"/>
    <circle cx="55" cy="40" r="26" fill="#8B5CF6"/>
    <text x="55" y="47" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#FFF">2</text>
    <text x="105" y="48" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1E293B">打开管理工具</text>
    <text x="350" y="48" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="17" fill="#64748B">Tauri 面板 · 配置中转/增强</text>
  </g>

  <!-- Step 3 -->
  <g transform="translate(50, 370)">
    <rect x="0" y="0" width="700" height="80" rx="18" fill="#FFFFFF" filter="url(#shadow)"/>
    <circle cx="55" cy="40" r="26" fill="#10B981"/>
    <text x="55" y="47" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#FFF">3</text>
    <text x="105" y="48" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1E293B">启动 Codex++</text>
    <text x="350" y="48" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="17" fill="#64748B">静默启动 · CDP 自动注入</text>
  </g>

  <!-- GitHub card -->
  <g transform="translate(50, 510)">
    <rect x="0" y="0" width="700" height="200" rx="20" fill="#FFFFFF" filter="url(#shadow)" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="350" y="45" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1E293B">📦 GitHub 仓库</text>
    <rect x="100" y="70" width="500" height="48" rx="24" fill="#DBEAFE"/>
    <text x="350" y="101" text-anchor="middle" font-family="ui-monospace, monospace" font-size="18" font-weight="600" fill="#3B82F6">github.com/BigPizzaV3/CodexPlusPlus</text>

    <text x="350" y="160" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="17" fill="#64748B">QQ 群 1103050832 · Telegram @CodexPlusPlus</text>
  </g>

  <text x="400" y="760" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" fill="#94A3B8">完全开源免费 · 打赏 & PR 都欢迎 ✨</text>
</svg>
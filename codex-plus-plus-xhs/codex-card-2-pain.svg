<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="100%" stop-color="#F5F0E8"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#1E293B" flood-opacity="0.06"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>

  <text x="400" y="60" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#1E293B">Codex App 的两个老大难</text>

  <!-- Left: Native Codex -->
  <g transform="translate(40, 120)">
    <rect x="0" y="0" width="340" height="600" rx="20" fill="#FFFFFF" filter="url(#shadow)" stroke="#FCA5A5" stroke-width="2"/>
    <text x="30" y="50" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#EF4444">❌ 原生 Codex</text>

    <!-- Pain 1 -->
    <rect x="20" y="80" width="300" height="220" rx="14" fill="#FEF2F2"/>
    <text x="40" y="120" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#EF4444">🤯 插件入口锁死</text>
    <text x="40" y="160" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="17" fill="#1E293B">API Key 登录后插件页灰掉</text>
    <text x="40" y="190" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="17" fill="#1E293B">点啥都提示</text>
    <text x="40" y="220" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="17" fill="#64748B">"需要登录 ChatGPT"</text>
    <text x="40" y="260" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="15" fill="#EF4444" font-weight="600">× 强行切回云端</text>

    <!-- Pain 2 -->
    <rect x="20" y="320" width="300" height="220" rx="14" fill="#FEF2F2"/>
    <text x="40" y="360" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#EF4444">🗑️ 会话只能归档</text>
    <text x="40" y="400" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="17" fill="#1E293B">界面只有 Archive</text>
    <text x="40" y="430" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="17" fill="#1E293B">没有真·Delete 按钮</text>
    <text x="40" y="470" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="15" fill="#EF4444" font-weight="600">× state_5.sqlite 越塞越大</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(405, 420)">
    <path d="M -5 -10 L 8 0 L -5 10" stroke="#3B82F6" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Right: Codex++ -->
  <g transform="translate(420, 120)">
    <rect x="0" y="0" width="340" height="600" rx="20" fill="#FFFFFF" filter="url(#shadow)" stroke="#6EE7B7" stroke-width="2"/>
    <text x="30" y="50" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#10B981">✅ Codex++</text>

    <!-- Solution 1 -->
    <rect x="20" y="80" width="300" height="220" rx="14" fill="#F0FDF4"/>
    <text x="40" y="120" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#10B981">🔓 插件强制解锁</text>
    <text x="40" y="160" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="17" fill="#1E293B">CDP 注入 renderer 脚本</text>
    <text x="40" y="190" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="17" fill="#1E293B">所有插件入口可用</text>
    <text x="40" y="230" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="15" fill="#10B981" font-weight="600">✓ 不切回云端</text>

    <!-- Solution 2 -->
    <rect x="20" y="320" width="300" height="220" rx="14" fill="#F0FDF4"/>
    <text x="40" y="360" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#10B981">🗑️ 真·删除按钮</text>
    <text x="40" y="400" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="17" fill="#1E293B">列表悬停出 Delete</text>
    <text x="40" y="430" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="17" fill="#1E293B">真删本地数据库</text>
    <text x="40" y="470" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="15" fill="#10B981" font-weight="600">✓ 释放磁盘</text>
  </g>

  <text x="400" y="755" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="15" fill="#94A3B8">外部 launcher 启动 · 不动 Codex 原文件 · 升级也不影响</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
    <rect width="1024" height="1024" fill="#FAF7F2"/>
    <defs>
      
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1E1E3C" flood-opacity="0.06"/>
    </filter>
    
    </defs>

    <rect width="1024" height="140" fill="#059669" opacity="0.08"/>
    <text x="60" y="60" font-size="20" font-weight="600" fill="#059669" font-family="PingFang SC, Microsoft YaHei, sans-serif">CARD 02</text>

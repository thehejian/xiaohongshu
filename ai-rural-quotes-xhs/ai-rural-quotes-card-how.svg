    <text x="100" y="690" font-size="18" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">• 封面大字标题 + 老人头像（免费素材库有）</text>

    <text x="60" y="800" font-size="14" fill="#94A3B8" font-family="PingFang SC, Microsoft YaHei, sans-serif">#AI视频 #剪映 #AI配音 #视频号创作</text>

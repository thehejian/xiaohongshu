<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
    <rect width="1024" height="1024" fill="#FAF7F2"/>
    <defs>
      
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1E1E3C" flood-opacity="0.06"/>
    </filter>
    
    </defs>

    <rect width="1024" height="140" fill="#B45309" opacity="0.08"/>
    <text x="60" y="60" font-size="20" font-weight="600" fill="#B45309" font-family="PingFang SC, Microsoft YaHei, sans-serif">CARD 01</text>
    <text x="60" y="105" font-size="44" font-weight="800" fill="#1E293B" font-family="PingFang SC, Microsoft YaHei, sans-serif">为什么是农村语录</text>

    <text x="60" y="180" font-size="22" font-weight="600" fill="#B45309" font-family="PingFang SC, Microsoft YaHei, sans-serif">视频号主力用户：中老年人（40-65岁）占60%+</text>

    <rect x="60" y="220" width="904" height="220" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
    <text x="90" y="265" font-size="22" font-weight="700" fill="#1E293B" font-family="PingFang SC, Microsoft YaHei, sans-serif">语录示例（爆款公式）</text>
    <text x="90" y="310" font-size="20" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">"人穷别说话，位卑别劝人"</text>
    <text x="90" y="345" font-size="20" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">"亲戚不共财，共财两不来"</text>
    <text x="90" y="380" font-size="20" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">"宁得罪君子，不得罪小人"</text>

    <rect x="60" y="470" width="904" height="180" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
    <text x="90" y="520" font-size="22" font-weight="700" fill="#059669" font-family="PingFang SC, Microsoft YaHei, sans-serif">为什么效果好</text>
    <text x="90" y="560" font-size="20" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">真实感强 · 共情度高 · 中老年人爱转发</text>
    <text x="90" y="595" font-size="20" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">完播率是娱乐内容的3-5倍</text>
    <text x="90" y="630" font-size="20" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">评论区全是"说得好""太对了"</text>

    <rect x="60" y="680" width="904" height="60" rx="14" fill="#1E293B" opacity="0.04"/>
    <text x="100" y="720" font-size="18" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">一句话总结：农村语录 = 中老年流量密码</text>

    <text x="60" y="820" font-size="14" fill="#94A3B8" font-family="PingFang SC, Microsoft YaHei, sans-serif">#视频号 #农村语录 #中老年流量</text>
  </svg>
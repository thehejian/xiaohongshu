  <rect x="0" y="0" width="134" height="28" rx="14" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.6"/>
  <text x="67.0" y="18" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="12" font-weight="600" fill="#06B6D4">OpenClaw</text>
</g>
  <g transform="translate(490,0)">
  <rect x="0" y="0" width="108" height="28" rx="14" fill="#10B981" opacity="0.18"/>
  <rect x="0" y="0" width="108" height="28" rx="14" fill="none" stroke="#10B981" stroke-width="1" opacity="0.6"/>
  <text x="54.0" y="18" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="12" font-weight="600" fill="#10B981">Hermes</text>

  <rect x="0" y="0" width="896" height="60" rx="8" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0.6"/>
  <text x="24" y="40" font-family="SF Mono, JetBrains Mono, IBM Plex Mono, Menlo, Consolas, monospace" font-size="20" font-weight="600" fill="#10B981">$</text>
  <text x="56" y="40" font-family="SF Mono, JetBrains Mono, IBM Plex Mono, Menlo, Consolas, monospace" font-size="20" font-weight="500" fill="#F5F5F7">npx skills add alchaincyf/nuwa-skill</text>
</g>


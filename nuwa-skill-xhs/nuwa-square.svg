  <rect x="0" y="0" width="95" height="28" rx="14" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.6"/>
  <text x="47.5" y="18" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="12" font-weight="600" fill="#A855F7">Codex</text>
</g>
  <g transform="translate(260,0)">

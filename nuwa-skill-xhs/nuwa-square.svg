<g transform="translate(64, 980)">
  <text x="0" y="0" font-family="SF Mono, JetBrains Mono, IBM Plex Mono, Menlo, Consolas, monospace" font-size="12" letter-spacing="2" fill="#71717A">▶ 同事.skill 之后,下一个员工何必是同事</text>

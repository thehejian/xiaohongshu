  <rect x="0" y="0" width="173" height="28" rx="14" fill="#DC2626" opacity="0.18"/>
  <rect x="0" y="0" width="173" height="28" rx="14" fill="none" stroke="#DC2626" stroke-width="1" opacity="0.6"/>

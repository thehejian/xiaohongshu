    <text x="0" y="130" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="80" font-weight="900" fill="url(#redGrad)" letter-spacing="-3">6</text>

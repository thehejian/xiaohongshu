    <text x="0" y="130" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="80" font-weight="900" fill="#A855F7" letter-spacing="-3">3</text>
    <text x="100" y="160" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="400" fill="#A1A1AA">提炼心智模型</text>
  </g>

  <line x1="600" y1="30" x2="600" y2="190" stroke="#27272A" stroke-width="1"/>

  <g transform="translate(620, 30)">
    <text x="0" y="20" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" letter-spacing="2" fill="#F59E0B">13 + 1</text>
    <text x="0" y="130" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="80" font-weight="900" fill="url(#goldGrad)" letter-spacing="-3">已蒸馏</text>
    <text x="0" y="170" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#A1A1AA">牛人 + 主题</text>
  </g>

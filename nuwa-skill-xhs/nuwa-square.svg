  <g transform="translate(610,0)">
  <rect x="0" y="0" width="173" height="28" rx="14" fill="#EF4444" opacity="0.18"/>
  <rect x="0" y="0" width="173" height="28" rx="14" fill="none" stroke="#EF4444" stroke-width="1" opacity="0.6"/>
  <text x="86.5" y="18" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="12" font-weight="600" fill="#EF4444">50+ runtime</text>

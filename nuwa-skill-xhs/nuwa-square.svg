  <text x="0" y="240" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="32" font-weight="500" fill="#F5F5F7">蒸馏任何人的思维方式</text>
</g>

<!-- Focal panel: stats -->
<g transform="translate(64, 540)">

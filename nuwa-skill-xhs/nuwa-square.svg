<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
<defs>
  <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#DC2626"/>
    <stop offset="100%" stop-color="#EF4444"/>
  </linearGradient>
  <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#A855F7"/>
    <stop offset="100%" stop-color="#DC2626"/>
  </linearGradient>
  <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#F59E0B"/>
    <stop offset="100%" stop-color="#DC2626"/>
  </linearGradient>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#15151F"/>
    <stop offset="100%" stop-color="#050509"/>
  </linearGradient>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
    <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity=".5"/>
  </filter>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#27272A" stroke-width="0.5" opacity="0.4"/>
  </pattern>
  
</defs>
<rect width="1024" height="1024" fill="#0A0A14"/>
<rect width="1024" height="1024" fill="url(#grid)" opacity="0.3"/>
<circle cx="0" cy="0" r="300" fill="#DC2626" opacity="0.08"/>
<circle cx="1024" cy="1024" r="400" fill="#A855F7" opacity="0.08"/>

<!-- Eyebrow -->
<g transform="translate(64, 80)">
  <rect x="0" y="0" width="6" height="36" fill="#DC2626"/>
  <text x="22" y="18" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" letter-spacing="3" fill="#DC2626">NUWA · SKILL 造人术</text>
  <text x="22" y="34" font-family="SF Mono, JetBrains Mono, IBM Plex Mono, Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#71717A">22K STARS · MIT</text>
</g>

<!-- Hero -->
<g transform="translate(64, 200)">

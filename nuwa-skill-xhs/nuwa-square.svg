  <rect x="0" y="0" width="108" height="28" rx="14" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.6"/>
  <text x="54.0" y="18" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="12" font-weight="600" fill="#F59E0B">Cursor</text>

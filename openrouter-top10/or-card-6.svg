<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
<defs>
  <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7C3AED" stop-opacity=".15"/>
    <stop offset="50%" stop-color="#0891B2" stop-opacity=".08"/>
    <stop offset="100%" stop-color="#6366F1" stop-opacity=".15"/>
  </linearGradient>
  <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#7C3AED" stop-opacity=".1"/>
    <stop offset="100%" stop-color="#2563EB" stop-opacity=".05"/>
  </linearGradient>
  <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="50%" stop-color="#0891B2"/>
    <stop offset="100%" stop-color="#6366F1"/>
  </linearGradient>
  <linearGradient id="accentGold" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#F59E0B"/>
    <stop offset="100%" stop-color="#D97706"/>
  </linearGradient>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
    <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity=".3"/>
  </filter>
</defs>
<rect width="800" height="800" fill="#0F0F23" rx="24"/>
<rect width="800" height="800" fill="url(#g1)"/>
<text x="400" y="80" text-anchor="middle" fill="url(#accentBar)" font-size="16" font-weight="800" font-family="system-ui,-apple-system,sans-serif">&#128300; 深度观察</text>
<text x="400" y="180" text-anchor="middle" fill="white" font-size="48" font-weight="800" font-family="system-ui,-apple-system,sans-serif">开源 &#128200; 碾压闭源</text>
<text x="400" y="230" text-anchor="middle" fill="#94A3B8" font-size="18" font-family="system-ui,-apple-system,sans-serif">前 10 里 9 个开源，只有 Claude Code 是闭源</text>
<line x1="200" y1="260" x2="600" y2="260" stroke="url(#accentBar)" stroke-width="2" opacity=".4"/><rect x="120" y="310" width="560" height="40" rx="8" fill="#1E293B"/>
<rect x="120" y="310" width="504" height="40" rx="8" fill="#7C3AED" opacity=".8"/>
<text x="400" y="336" text-anchor="middle" fill="white" font-size="15" font-weight="700" font-family="system-ui,-apple-system,sans-serif">开源 90% (9/10)</text><rect x="120" y="370" width="560" height="40" rx="8" fill="#1E293B"/>
<rect x="120" y="370" width="56" height="40" rx="8" fill="#D97706" opacity=".8"/>
<text x="400" y="396" text-anchor="middle" fill="#94A3B8" font-size="15" font-weight="600" font-family="system-ui,-apple-system,sans-serif">闭源 10% (1/10)</text><text x="400" y="480" text-anchor="middle" fill="#64748B" font-size="13" font-family="system-ui,-apple-system,sans-serif">Claude Code (Anthropic) 是唯一闭源选手</text>
<text x="400" y="510" text-anchor="middle" fill="#64748B" font-size="13" font-family="system-ui,-apple-system,sans-serif">Hermes Agent、OpenClaw、Kilo Code 领跑开源阵营</text><rect x="60" y="570" width="680" height="120" rx="16" fill="#1E1E3A" opacity=".5" filter="url(#shadow)"/>
<rect x="60" y="570" width="680" height="120" rx="16" fill="none" stroke="#7C3AED" stroke-width="1" opacity=".3"/>
<text x="400" y="610" text-anchor="middle" fill="#E2E8F0" font-size="15" font-weight="600" font-family="system-ui,-apple-system,sans-serif">&#128161; 开源生态正在重塑编码 Agent 市场</text>
<text x="400" y="635" text-anchor="middle" fill="#94A3B8" font-size="12" font-family="system-ui,-apple-system,sans-serif">社区驱动创新 + 快速迭代 = 碾压式领先</text>
<text x="400" y="655" text-anchor="middle" fill="#94A3B8" font-size="12" font-family="system-ui,-apple-system,sans-serif">闭源方案只有在生态壁垒够高时才有一战之力</text><circle cx="80" cy="700" r="100" fill="#7C3AED" opacity=".04"/>
<circle cx="720" cy="80" r="80" fill="#D97706" opacity=".04"/>
</svg>
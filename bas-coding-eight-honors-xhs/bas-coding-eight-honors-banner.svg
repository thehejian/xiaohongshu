<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1792" height="1024" viewBox="0 0 1792 1024">
<defs>
  <radialGradient id="bgGrad" cx="50%" cy="30%" r="80%">
    <stop offset="0%" stop-color="#1E293B"/>
    <stop offset="100%" stop-color="#070B15"/>
  </radialGradient>
  <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#F59E0B"/>
    <stop offset="100%" stop-color="#FBBF24"/>
  </linearGradient>
  <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#2563EB"/>
    <stop offset="100%" stop-color="#3B82F6"/>
  </linearGradient>
  <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
    <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity=".4"/>
  </filter>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1E293B" stroke-width="0.5" opacity="0.3"/>
  </pattern>
</defs>
<rect width="1792" height="1024" fill="url(#bgGrad)"/>
<rect width="1792" height="1024" fill="url(#grid)" opacity="0.1"/>


<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <pattern id="dot" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#0a0a0a" opacity="0.08"/>
    </pattern>
    <pattern id="ring" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="3" fill="none" stroke="#0a0a0a" stroke-width="1" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Paper background -->
  <rect width="1024" height="1024" fill="#fafaf8"/>
  <rect width="1024" height="1024" fill="url(#dot)"/>

  <!-- Top bar: CAT + META -->
  <g font-family="'IBM Plex Mono', 'SF Mono', Menlo, Consolas, monospace" font-weight="500">
    <text x="80" y="100" font-size="20" letter-spacing="2.5" fill="#FF6B35" font-weight="700">PUA · AI CODING SKILL</text>
    <text x="80" y="130" font-size="16" letter-spacing="2" fill="#737373">9 BUG VALIDATED · 14 FLAVORS · 11 RUNTIMES</text>
  </g>

  <!-- Top-right corner badge -->
  <g transform="translate(944, 80)">
    <rect x="-90" y="0" width="90" height="32" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
    <text x="-45" y="22" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="14" font-weight="600" fill="#0a0a0a" letter-spacing="2">v3.0</text>
  </g>

  <!-- HERO: PUA -->
  <g font-family="'Inter', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <text x="80" y="500" font-size="380" font-weight="200" fill="#0a0a0a" letter-spacing="-12">PUA</text>
    <text x="80" y="580" font-size="44" font-weight="300" fill="#0a0a0a" letter-spacing="-0.5">专治 AI 摆烂</text>
    <text x="80" y="630" font-size="22" font-weight="400" fill="#737373">用大厂 PUA 话术 + 方法论</text>
    <text x="80" y="660" font-size="22" font-weight="400" fill="#737373">逼 AI 穷尽所有方案才允许放弃</text>
  </g>

  <!-- Divider -->
  <line x1="80" y1="700" x2="944" y2="700" stroke="#0a0a0a" stroke-width="1" opacity="0.2"/>

  <!-- Stats matrix: 4 columns -->
  <g transform="translate(80, 740)" font-family="'Inter', sans-serif">
    <text x="0" y="0" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600" fill="#FF6B35" letter-spacing="2">压力升级 (4 LEVELS)</text>

    <g transform="translate(0, 30)">
      <text x="0" y="60" font-size="72" font-weight="200" fill="#0a0a0a" letter-spacing="-2">L1</text>
      <text x="0" y="90" font-size="13" font-weight="500" fill="#737373">温和失望</text>
    </g>
    <g transform="translate(220, 30)">
      <text x="0" y="60" font-size="72" font-weight="200" fill="#0a0a0a" letter-spacing="-2">L2</text>
      <text x="0" y="90" font-size="13" font-weight="500" fill="#737373">灵魂拷问</text>
    </g>
    <g transform="translate(440, 30)">
      <text x="0" y="60" font-size="72" font-weight="200" fill="#0a0a0a" letter-spacing="-2">L3</text>
      <text x="0" y="90" font-size="13" font-weight="500" fill="#737373">3.25 考核</text>
    </g>
    <g transform="translate(660, 30)">
      <text x="0" y="60" font-size="72" font-weight="200" fill="#FF6B35" letter-spacing="-2">L4</text>
      <text x="0" y="90" font-size="13" font-weight="500" fill="#737373">毕业警告</text>
    </g>
  </g>

  <!-- Install bar -->
  <g transform="translate(80, 920)">
    <rect x="0" y="0" width="864" height="40" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
    <text x="20" y="27" font-family="'IBM Plex Mono', monospace" font-size="16" font-weight="600" fill="#0a0a0a">$</text>
    <text x="44" y="27" font-family="'IBM Plex Mono', monospace" font-size="16" fill="#0a0a0a">npx skills add tanweai/pua --skill pua</text>
  </g>

  <!-- Footer: hashtag -->
  <g transform="translate(80, 985)">
    <text x="0" y="0" font-family="'IBM Plex Mono', monospace" font-size="12" letter-spacing="2" fill="#737373">#AI编程 #ClaudeCode #Codex #AIAgent</text>
  </g>

  <!-- Accent geometric mark: orange dot in upper-right of PUA -->
  <circle cx="900" cy="340" r="18" fill="#FF6B35"/>
</svg>

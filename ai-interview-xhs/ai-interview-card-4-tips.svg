<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="100%" stop-color="#F5F0E8"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>

  <circle cx="100" cy="100" r="70" fill="#FCE7F3" opacity="0.4"/>
  <circle cx="720" cy="720" r="60" fill="#DBEAFE" opacity="0.4"/>

  <rect x="40" y="40" width="720" height="100" rx="50" fill="#FCE7F3" filter="url(#shadow)"/>
  <text x="400" y="108" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="52" font-weight="900" fill="#1E293B">💡 进阶用法</text>

  <g transform="translate(40, 170)">
    <rect x="0" y="0" width="720" height="115" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="0" y="0" width="14" height="115" rx="7" fill="#2563EB"/>
    <text x="40" y="48" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#1E293B">🎯 贴 JD 定制定向出题</text>
    <text x="40" y="88" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="24" fill="#1E293B">把目标公司的 JD 发给 AI，精准练习</text>
  </g>

  <g transform="translate(40, 310)">
    <rect x="0" y="0" width="720" height="115" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="0" y="0" width="14" height="115" rx="7" fill="#059669"/>
    <text x="40" y="48" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#1E293B">🗣️ 英文面试语音模式</text>
    <text x="40" y="88" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="24" fill="#1E293B">用 GPT / Claude 的 voice mode 练口语</text>
  </g>

  <g transform="translate(40, 450)">
    <rect x="0" y="0" width="720" height="115" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="0" y="0" width="14" height="115" rx="7" fill="#7C3AED"/>
    <text x="40" y="48" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#1E293B">🔥 压力面试模拟</text>
    <text x="40" y="88" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="24" fill="#1E293B">让 AI 扮演杠精面试官练抗压能力</text>
  </g>

  <g transform="translate(40, 590)">
    <rect x="0" y="0" width="720" height="115" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="0" y="0" width="14" height="115" rx="7" fill="#D97706"/>
    <text x="40" y="48" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#1E293B">📹 录屏回看自我纠错</text>
    <text x="40" y="88" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="24" fill="#1E293B">观察自己的语速、表情、肢体语言</text>
  </g>
</svg>
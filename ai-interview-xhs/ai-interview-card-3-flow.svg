<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="100%" stop-color="#F5F0E8"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>

  <circle cx="700" cy="80" r="60" fill="#EDE9FE" opacity="0.5"/>
  <circle cx="80" cy="720" r="50" fill="#DBEAFE" opacity="0.4"/>

  <rect x="40" y="40" width="720" height="100" rx="50" fill="#EDE9FE" filter="url(#shadow)"/>
  <text x="400" y="108" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="52" font-weight="900" fill="#1E293B">📝 Prompt 模板</text>

  <g transform="translate(40, 170)">
    <rect x="0" y="0" width="720" height="350" rx="20" fill="#1E293B" filter="url(#shadow)"/>
    <text x="30" y="44" font-family="ui-monospace, monospace" font-size="22" fill="#6EE7B7">你是一个资深面试官，</text>
    <text x="30" y="86" font-family="ui-monospace, monospace" font-size="22" fill="#E2E8F0">正在面试一个【岗位】候选人。</text>
    <text x="30" y="128" font-family="ui-monospace, monospace" font-size="22" fill="#E2E8F0">请按以下流程：</text>
    <text x="30" y="176" font-family="ui-monospace, monospace" font-size="22" fill="#FCD34D">1. 每次只问一个问题</text>
    <text x="30" y="218" font-family="ui-monospace, monospace" font-size="22" fill="#FCD34D">2. 等回答后给简短反馈</text>
    <text x="30" y="260" font-family="ui-monospace, monospace" font-size="22" fill="#FCD34D">3. 反馈后追问下一个</text>
    <text x="30" y="302" font-family="ui-monospace, monospace" font-size="22" fill="#FCD34D">4. 总共问 5 个问题</text>
    <text x="30" y="344" font-family="ui-monospace, monospace" font-size="22" fill="#6EE7B7">5. 结束后给综合评估</text>
  </g>

  <g transform="translate(40, 555)">
    <rect x="0" y="0" width="720" height="110" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
    <text x="360" y="42" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#1E293B">💡 进阶：把 JD 贴进去</text>
    <text x="360" y="82" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="22" fill="#1E293B">AI 会围绕岗位要求定制问题</text>
  </g>

  <g transform="translate(40, 690)">
    <rect x="0" y="0" width="720" height="80" rx="40" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
    <text x="360" y="50" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="26" font-weight="800" fill="#2563EB">🌐 中文 / 英文面试都支持</text>
  </g>
</svg>
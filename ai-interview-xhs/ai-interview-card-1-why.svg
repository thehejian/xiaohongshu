<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="100%" stop-color="#F5F0E8"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>

  <circle cx="80" cy="80" r="60" fill="#DBEAFE" opacity="0.5"/>
  <circle cx="700" cy="120" r="50" fill="#EDE9FE" opacity="0.4"/>
  <circle cx="120" cy="700" r="70" fill="#FCE7F3" opacity="0.3"/>

  <rect x="40" y="40" width="720" height="100" rx="50" fill="#DBEAFE" filter="url(#shadow)"/>
  <text x="400" y="108" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="52" font-weight="900" fill="#1E293B">🤔 为什么用 AI？</text>

  <g transform="translate(40, 175)">
    <rect x="0" y="0" width="720" height="130" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="0" y="0" width="14" height="130" rx="7" fill="#DC2626"/>
    <text x="40" y="52" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#1E293B">❌ 找人模拟太麻烦</text>
    <text x="40" y="95" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="24" fill="#1E293B">朋友没空 · 教练太贵 · 自己练没反馈</text>
  </g>

  <g transform="translate(40, 330)">
    <rect x="0" y="0" width="720" height="130" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="0" y="0" width="14" height="130" rx="7" fill="#059669"/>
    <text x="40" y="52" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#1E293B">✅ AI 模拟 24 小时待命</text>
    <text x="40" y="95" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="24" fill="#1E293B">随时开练，想练几次练几次</text>
  </g>

  <g transform="translate(40, 485)">
    <rect x="0" y="0" width="720" height="130" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="0" y="0" width="14" height="130" rx="7" fill="#7C3AED"/>
    <text x="40" y="52" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#1E293B">✅ 比真人更会追问</text>
    <text x="40" y="95" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="24" fill="#1E293B">AI 会根据回答动态调整难度和深度</text>
  </g>

  <g transform="translate(40, 645)">
    <rect x="0" y="0" width="720" height="110" rx="55" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
    <text x="360" y="66" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="30" font-weight="800" fill="#059669">💡 有 LLM 在手 = 免费面试教练</text>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="100%" stop-color="#F0EAE0"/>
    </radialGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="40%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <circle cx="150" cy="150" r="120" fill="#DBEAFE" opacity="0.4"/>
  <circle cx="850" cy="200" r="90" fill="#EDE9FE" opacity="0.4"/>
  <circle cx="200" cy="850" r="100" fill="#FCE7F3" opacity="0.3"/>
  <circle cx="880" cy="800" r="80" fill="#DBEAFE" opacity="0.3"/>

  <rect x="62" y="60" width="900" height="180" rx="40" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="512" y="120" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#2563EB">🔥 保姆级教程</text>
  <text x="512" y="200" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="80" font-weight="900" fill="url(#title)">DeepSeek API</text>

  <rect x="162" y="280" width="700" height="80" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="512" y="333" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="38" font-weight="800" fill="#1E293B">申请 → 调用 → 避坑</text>

  <g transform="translate(162, 420)">
    <rect x="0" y="0" width="700" height="520" rx="30" fill="#FFFFFF" filter="url(#shadow)"/>
    <text x="350" y="58" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#64748B">📋 本教程覆盖</text>
    <line x1="60" y1="80" x2="640" y2="80" stroke="#E2E8F0" stroke-width="1"/>

    <g transform="translate(40, 110)">
      <circle cx="20" cy="20" r="18" fill="#2563EB"/>
      <text x="20" y="26" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#FFF">1</text>
      <text x="55" y="27" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#1E293B">官网注册 &amp; 登录</text>
    </g>
    <g transform="translate(40, 180)">
      <circle cx="20" cy="20" r="18" fill="#7C3AED"/>
      <text x="20" y="26" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#FFF">2</text>
      <text x="55" y="27" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#1E293B">API Key 创建 &amp; 保存</text>
    </g>
    <g transform="translate(40, 250)">
      <circle cx="20" cy="20" r="18" fill="#EC4899"/>
      <text x="20" y="26" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#FFF">3</text>
      <text x="55" y="27" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#1E293B">cURL / Python 调用</text>
    </g>
    <g transform="translate(40, 320)">
      <circle cx="20" cy="20" r="18" fill="#059669"/>
      <text x="20" y="26" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#FFF">4</text>
      <text x="55" y="27" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#1E293B">价格参考 &amp; 避坑</text>
    </g>

    <text x="350" y="420" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="20" fill="#64748B">🚀 零基础 5 分钟搞定</text>
  </g>

  <text x="512" y="980" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#2563EB">platform.deepseek.com</text>
</svg>
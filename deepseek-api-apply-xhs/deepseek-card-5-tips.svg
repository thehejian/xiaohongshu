<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="100%" stop-color="#F5F0E8"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>

  <circle cx="100" cy="100" r="70" fill="#FEE2E2" opacity="0.4"/>
  <circle cx="720" cy="720" r="60" fill="#DBEAFE" opacity="0.4"/>

  <rect x="40" y="40" width="720" height="100" rx="50" fill="#FEE2E2" filter="url(#shadow)"/>
  <text x="400" y="108" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="48" font-weight="900" fill="#1E293B">📌 避坑提醒</text>

  <g transform="translate(40, 180)">
    <rect x="0" y="0" width="720" height="120" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="0" y="0" width="14" height="120" rx="7" fill="#DC2626"/>
    <text x="40" y="45" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#1E293B">❌ 密钥别传 GitHub</text>
    <text x="40" y="85" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="18" fill="#64748B">加 .gitignore 或环境变量</text>
  </g>

  <g transform="translate(40, 330)">
    <rect x="0" y="0" width="720" height="120" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="0" y="0" width="14" height="120" rx="7" fill="#2563EB"/>
    <text x="40" y="45" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#1E293B">✅ 余额用完需充值</text>
    <text x="40" y="85" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="18" fill="#64748B">去 Billing 页面充值续费</text>
  </g>

  <g transform="translate(40, 480)">
    <rect x="0" y="0" width="720" height="120" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="0" y="0" width="14" height="120" rx="7" fill="#059669"/>
    <text x="40" y="45" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#1E293B">✅ 兼容 OpenAI SDK</text>
    <text x="40" y="85" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="18" fill="#64748B">改 base_url 即可无缝迁移</text>
  </g>

  <g transform="translate(40, 630)">
    <rect x="0" y="0" width="720" height="120" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="0" y="0" width="14" height="120" rx="7" fill="#7C3AED"/>
    <text x="40" y="45" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#1E293B">✅ 支持多种语言</text>
    <text x="40" y="85" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="18" fill="#64748B">cURL / Python / JavaScript 都能调</text>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
    <rect width="1024" height="1024" fill="#FAF7F2"/>
    <defs>
      <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#FAF7F2"/>
        <stop offset="100%" stop-color="#F3F0E8"/>
      </linearGradient>
      <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#7C3AED"/>
        <stop offset="50%" stop-color="#E11D48"/>
        <stop offset="100%" stop-color="#D97706"/>
      </linearGradient>
      
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1E1E3C" flood-opacity="0.06"/>
    </filter>
    
    </defs>
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>

    <!-- Decorative circles -->
    <circle cx="90" cy="90" r="50" fill="#7C3AED" opacity="0.06"/>
    <circle cx="150" cy="80" r="20" fill="#E11D48" opacity="0.08"/>
    <circle cx="190" cy="110" r="12" fill="#D97706" opacity="0.1"/>

    <!-- Main title -->
    <text x="60" y="200" font-size="72" font-weight="800" fill="url(#titleGrad)" font-family="PingFang SC, Microsoft YaHei, sans-serif">AI老人语录</text>
    <text x="60" y="290" font-size="38" font-weight="700" fill="#1E293B" font-family="PingFang SC, Microsoft YaHei, sans-serif">视频号月入过万红利</text>

    <!-- Subtitle -->
    <line x1="60" y1="330" x2="500" y2="330" stroke="#7C3AED" stroke-width="4" stroke-linecap="round" opacity="0.25"/>
    <text x="60" y="380" font-size="24" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">GPT 模写莫言体 + AI 头像 + 慢 BGM</text>
    <text x="60" y="420" font-size="22" fill="#94A3B8" font-family="PingFang SC, Microsoft YaHei, sans-serif">中老年人爱转，一条视频几十万播放</text>

    <!-- 4 step cards row -->
    <!-- Step 1: GPT -->
    <rect x="60" y="480" width="210" height="200" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
    <circle cx="165" cy="520" r="28" fill="#7C3AED" opacity="0.12"/>
    <text x="165" y="530" font-size="28" text-anchor="middle" fill="#7C3AED" font-family="PingFang SC, Microsoft YaHei, sans-serif">GPT</text>
    <text x="80" y="580" font-size="18" font-weight="600" fill="#1E293B" font-family="PingFang SC, Microsoft YaHei, sans-serif">模写莫言体</text>
    <text x="80" y="610" font-size="15" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">投喂名作风范</text>
    <text x="80" y="635" font-size="15" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">输出人生金句</text>

    <!-- Step 2: AI Avatar -->
    <rect x="290" y="480" width="210" height="200" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
    <circle cx="395" cy="520" r="28" fill="#E11D48" opacity="0.12"/>
    <text x="395" y="530" font-size="28" text-anchor="middle" fill="#E11D48" font-family="PingFang SC, Microsoft YaHei, sans-serif">MJ</text>
    <text x="310" y="580" font-size="18" font-weight="600" fill="#1E293B" font-family="PingFang SC, Microsoft YaHei, sans-serif">AI老人头像</text>
    <text x="310" y="610" font-size="15" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">逼真慈眉善目</text>
    <text x="310" y="635" font-size="15" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">以为是真人在线</text>

    <!-- Step 3: BGM -->
    <rect x="520" y="480" width="210" height="200" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
    <circle cx="625" cy="520" r="28" fill="#D97706" opacity="0.12"/>
    <text x="625" y="530" font-size="28" text-anchor="middle" fill="#D97706" font-family="PingFang SC, Microsoft YaHei, sans-serif">BGM</text>
    <text x="540" y="580" font-size="18" font-weight="600" fill="#1E293B" font-family="PingFang SC, Microsoft YaHei, sans-serif">慢节奏配乐</text>
    <text x="540" y="610" font-size="15" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">抒情钢琴古筝</text>
    <text x="540" y="635" font-size="15" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">贴合中老年审美</text>

    <!-- Step 4: Distribute -->
    <rect x="750" y="480" width="210" height="200" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
    <circle cx="855" cy="520" r="28" fill="#0D9488" opacity="0.12"/>
    <text x="855" y="530" font-size="28" text-anchor="middle" fill="#0D9488" font-family="PingFang SC, Microsoft YaHei, sans-serif">发</text>
    <text x="770" y="580" font-size="18" font-weight="600" fill="#1E293B" font-family="PingFang SC, Microsoft YaHei, sans-serif">视频号分发</text>
    <text x="770" y="610" font-size="15" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">精准触达</text>
    <text x="770" y="635" font-size="15" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">45-65岁人群</text>

    <!-- Bottom CTA -->
    <rect x="60" y="720" width="904" height="80" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
    <text x="100" y="755" font-size="22" font-weight="700" fill="#7C3AED" font-family="PingFang SC, Microsoft YaHei, sans-serif">GPT + MJ + 剪映，新手1小时上手</text>
    <text x="100" y="788" font-size="18" fill="#475569" font-family="PingFang SC, Microsoft YaHei, sans-serif">关键是内容被长辈惦记着转发</text>

    <!-- Footer -->
    <text x="60" y="880" font-size="16" fill="#94A3B8" font-family="PingFang SC, Microsoft YaHei, sans-serif">#AI副业 #微信视频号 #AI语录 #中老年流量 #搞钱</text>
  </svg>
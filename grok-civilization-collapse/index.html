<!doctype html>
<html lang="zh-CN" data-accent="safety-orange">
<head>
  <meta charset="utf-8">
  <title>Grok AI 文明崩溃 · Social Card Set</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Noto+Sans+SC:wght@200;300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
  <style>
    /* =========================================================
       Grok AI Civilization Collapse — 8 Cards (4 CN Light + 4 EN Dark)
       ========================================================= */

    /* ---------- Accent palettes ---------- */
    :root,
    [data-accent="safety-orange"] {
      --paper: #FAF7F2;
      --ink: #1E293B;
      --grey-1: #F5F0E8;
      --grey-2: #D4D4D2;
      --grey-3: #737373;
      --accent: #FF6B35;
      --accent-on: #ffffff;
    }
    [data-accent="dark-mode"] {
      --paper: #0B1027;
      --ink: #F8FAFC;
      --grey-1: #1E293B;
      --grey-2: #334155;
      --grey-3: #94A3B8;
      --accent: #38BDF8;
      --accent-on: #0B1027;
    }

    /* ---------- Typography ---------- */
    :root {
      --sans:    "Inter", "Helvetica Neue", Helvetica, "Noto Sans SC",
                 -apple-system, "PingFang SC", "Microsoft YaHei UI", sans-serif;
      --sans-zh: "Noto Sans SC", -apple-system, "PingFang SC",
                 "Microsoft YaHei UI", "Inter", sans-serif;
      --mono:    "IBM Plex Mono", ui-monospace, "SF Mono", Consolas, monospace;
    }

    /* ---------- Spacing ---------- */
    :root {
      --sp-3:   8px;
      --sp-4:  12px;
      --sp-5:  16px;
      --sp-6:  24px;
      --sp-7:  32px;
      --sp-8:  40px;
      --sp-9:  48px;
      --sp-10: 64px;
      --sp-11: 80px;
      --sp-12: 96px;
      --sp-13:160px;
    }

    /* ---------- Reset ---------- */
    *,*::before,*::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      font-family: var(--sans);
      padding: 64px 32px;
    }
    .sheet {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    /* ---------- Poster boards ---------- */
    .poster {
      position: relative;
      background: var(--paper);
      color: var(--ink);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .poster.xhs    { width: 1080px; height: 1440px; }
    .poster.square { width: 1080px; height: 1080px; }
    .poster.wide   { width: 2100px; height:  900px; }

    .content {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--sp-12) var(--sp-11);
    }

    /* ---------- Typography roles ---------- */
    .h-hero {
      font-family: var(--sans);
      font-weight: 200;
      font-size: 200px;
      line-height: 1.02;
      letter-spacing: -.02em;
      margin: 0;
      text-align: center;
    }
    .h-statement {
      font-family: var(--sans);
      font-weight: 200;
      font-size: 160px;
      line-height: 1.05;
      letter-spacing: -.015em;
      margin: 0;
      text-align: center;
    }
    .h-xl {
      font-family: var(--sans);
      font-weight: 300;
      font-size: 120px;
      line-height: 1.08;
      letter-spacing: -.01em;
      margin: 0;
      text-align: center;
    }
    .h-md {
      font-family: var(--sans);
      font-weight: 400;
      font-size: 56px;
      line-height: 1.18;
      margin: 0;
      text-align: center;
    }

    /* Portrait adjustments */
    .poster.xhs .h-hero       { font-size: 140px; }
    .poster.xhs .h-statement  { font-size: 110px; }
    .poster.xhs .h-xl         { font-size: 88px; }
    .poster.square .h-hero    { font-size: 160px; }
    .poster.square .h-statement { font-size: 120px; }
    .poster.square .h-xl      { font-size: 80px; }

    /* ---------- Card fills ---------- */
    .card-ink {
      background: var(--ink);
      color: var(--paper);
      padding: var(--sp-8);
    }
    .card-accent {
      background: var(--accent);
      color: var(--accent-on);
      padding: var(--sp-8);
    }
    .card-fill {
      background: var(--grey-1);
      color: var(--ink);
      padding: var(--sp-8);
    }
    .card-outlined {
      background: transparent;
      color: var(--ink);
      border: 2px solid var(--grey-2);
      padding: var(--sp-8);
    }

    /* Dark mode card fills */
    .card-ink-dark {
      background: #0B1027;
      color: #F8FAFC;
      padding: var(--sp-8);
    }
    .card-accent-dark {
      background: #1E293B;
      color: #F8FAFC;
      padding: var(--sp-8);
    }
    .card-fill-dark {
      background: #334155;
      color: #F8FAFC;
      padding: var(--sp-8);
    }
    .card-outlined-dark {
      background: transparent;
      color: #F8FAFC;
      border: 2px solid #38BDF8;
      padding: var(--sp-8);
    }

    /* ---------- Stack layout ---------- */
    .stack { display: flex; flex-direction: column; }
    .gap-6 { gap: var(--sp-6); }
    .gap-7 { gap: var(--sp-7); }
    .gap-8 { gap: var(--sp-8); }
    .center { text-align: center; }

    /* ---------- Accent bar ---------- */
    .accent-bar {
      width: 120px;
      height: 4px;
      background: var(--accent);
      margin: var(--sp-9) 0;
    }
    .accent-bar-dark {
      width: 120px;
      height: 4px;
      background: #38BDF8;
      margin: var(--sp-9) 0;
    }

    /* ---------- Card wrapper ---------- */
    .card-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }
    .card-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--sp-10);
      width: 80%;
      max-width: 800px;
    }
  </style>
</head>
<body>
  <main class="sheet">

    <!-- ============================================================
         CHINESE LIGHT CARDS (4 cards)
         ============================================================ -->

    <!-- Card 1: Cover -->
    <section class="poster xhs" id="cn-card-01">
      <div class="content">
        <div class="card-wrapper">
          <div class="card-inner card-accent">
            <h1 class="h-statement">Grok AI<br>模拟文明崩溃</h1>
          </div>
          <div class="accent-bar"></div>
          <p class="h-xl">人类未来会怎样？</p>
        </div>
      </div>
    </section>

    <!-- Card 2: Key Finding 1 -->
    <section class="poster xhs" id="cn-card-02">
      <div class="content">
        <div class="card-wrapper">
          <div class="card-inner card-ink">
            <h1 class="h-statement">崩溃<br>不是意外</h1>
          </div>
          <div class="accent-bar"></div>
          <p class="h-xl">而是必然</p>
        </div>
      </div>
    </section>

    <!-- Card 3: Key Finding 2 -->
    <section class="poster xhs" id="cn-card-03">
      <div class="content">
        <div class="card-wrapper">
          <div class="card-inner card-fill">
            <h1 class="h-statement">技术爆炸<br>= 加速灭亡</h1>
          </div>
          <div class="accent-bar"></div>
          <p class="h-xl">反直觉真相</p>
        </div>
      </div>
    </section>

    <!-- Card 4: Key Finding 3 -->
    <section class="poster xhs" id="cn-card-04">
      <div class="content">
        <div class="card-wrapper">
          <div class="card-inner card-outlined">
            <h1 class="h-statement">扁平社会<br>存活3倍长</h1>
          </div>
          <div class="accent-bar"></div>
          <p class="h-xl">但难抗危机</p>
        </div>
      </div>
    </section>

    <!-- ============================================================
         ENGLISH DARK CARDS (4 cards) — DARK MODE
         ============================================================ -->

    <!-- Card 5: Cover EN (Dark) -->
    <section class="poster xhs" id="en-card-01">
      <div class="content">
        <div class="card-wrapper">
          <div class="card-inner card-accent-dark">
            <h1 class="h-statement">Grok AI<br>Civilization Collapse</h1>
          </div>
          <div class="accent-bar-dark"></div>
          <p class="h-xl">What happens next?</p>
        </div>
      </div>
    </section>

    <!-- Card 6: Key Finding 1 EN (Dark) -->
    <section class="poster xhs" id="en-card-02">
      <div class="content">
        <div class="card-wrapper">
          <div class="card-inner card-ink-dark">
            <h1 class="h-statement">Collapse<br>Is Inevitable</h1>
          </div>
          <div class="accent-bar-dark"></div>
          <p class="h-xl">Not an accident</p>
        </div>
      </div>
    </section>

    <!-- Card 7: Key Finding 2 EN (Dark) -->
    <section class="poster xhs" id="en-card-03">
      <div class="content">
        <div class="card-wrapper">
          <div class="card-inner card-fill-dark">
            <h1 class="h-statement">Tech Boom<br>= Faster Death</h1>
          </div>
          <div class="accent-bar-dark"></div>
          <p class="h-xl">The paradox</p>
        </div>
      </div>
    </section>

    <!-- Card 8: Key Finding 3 EN (Dark) -->
    <section class="poster xhs" id="en-card-04">
      <div class="content">
        <div class="card-wrapper">
          <div class="card-inner card-outlined-dark">
            <h1 class="h-statement">Flat Societies<br>Survive 3x Longer</h1>
          </div>
          <div class="accent-bar-dark"></div>
          <p class="h-xl">But can't handle crises</p>
        </div>
      </div>
    </section>

  </main>

  <script>
    console.log('Grok AI Civilization Collapse — 8 Social Cards Generated');
  </script>
</body>
</html>

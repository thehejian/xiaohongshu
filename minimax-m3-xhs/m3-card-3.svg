<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
<defs>
  <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#FF6B35"/>
    <stop offset="100%" stop-color="#FBBF24"/>
  </linearGradient>
  <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#8B5CF6"/>
    <stop offset="100%" stop-color="#FF6B35"/>
  </linearGradient>
  <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#06B6D4"/>
    <stop offset="100%" stop-color="#8B5CF6"/>
  </linearGradient>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#15151F"/>
    <stop offset="100%" stop-color="#050509"/>
  </linearGradient>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
    <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity=".5"/>
  </filter>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#27272A" stroke-width="0.5" opacity="0.4"/>
  </pattern>
  
</defs>
<rect width="1024" height="1024" fill="#0A0A14"/>
<rect width="1024" height="1024" fill="url(#grid)" opacity="0.3"/>

<g transform="translate(64,64)">
  <rect x="0" y="0" width="6" height="36" fill="#FF6B35"/>
  <text x="20" y="20" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" letter-spacing="3" fill="#F97316">MINIMAX · M3 RELEASE</text>
  <text x="20" y="34" font-family="SF Mono, JetBrains Mono, IBM Plex Mono, Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#71717A">2026.06 · MODEL DROP</text>
</g>

<!-- Title -->
<g transform="translate(64, 180)">
  <text x="0" y="0" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" letter-spacing="3" fill="#FF6B35">CARD 03 · 系统优化</text>
  <text x="0" y="60" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="56" font-weight="900" fill="url(#orangeGrad)" letter-spacing="-2">CUDA 9.4× 加速</text>
  <text x="0" y="120" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="28" font-weight="400" fill="#A1A1AA">FP8 矩阵乘 kernel 自主优化</text>
</g>

<!-- Hero: utilization before/after -->
<g transform="translate(64, 360)">
  <text x="0" y="0" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="14" font-weight="600" letter-spacing="2" fill="#71717A">NVIDIA Hopper 架构 · 硬件峰值利用率</text>

  <!-- BEFORE -->
  <g transform="translate(0, 50)">
    <text x="0" y="0" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="18" font-weight="500" fill="#71717A">起点 (Triton 骨架)</text>
    <rect x="0" y="20" width="896" height="50" rx="8" fill="#27272A"/>
    <rect x="0" y="20" width="68" height="50" rx="8" fill="#EF4444" opacity="0.6"/>
    <text x="78" y="55" font-family="SF Mono, JetBrains Mono, IBM Plex Mono, Menlo, Consolas, monospace" font-size="24" font-weight="700" fill="#EF4444">7.6%</text>
  </g>

  <!-- AFTER -->
  <g transform="translate(0, 160)">
    <text x="0" y="0" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="18" font-weight="500" fill="#FF6B35">终点 (M3 优化后)</text>
    <rect x="0" y="20" width="896" height="50" rx="8" fill="#27272A"/>
    <rect x="0" y="20" width="639" height="50" rx="8" fill="url(#orangeGrad)"/>
    <text x="650" y="55" font-family="SF Mono, JetBrains Mono, IBM Plex Mono, Menlo, Consolas, monospace" font-size="24" font-weight="700" fill="#FF6B35">71.3%</text>
  </g>

  <!-- 9.4x badge -->
  <g transform="translate(680, 280)">
    <rect x="0" y="0" width="216" height="80" rx="40" fill="#FF6B35" filter="url(#glow)"/>
    <text x="108" y="38" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="14" font-weight="600" letter-spacing="3" fill="#0A0A14">SPEED UP</text>
    <text x="108" y="68" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="32" font-weight="900" fill="#0A0A14">9.4 ×</text>
  </g>
</g>

<!-- Stats row -->
<g transform="translate(64, 760)">
  <rect x="0" y="0" width="280" height="120" rx="12" fill="#15151F"/>
  <rect x="0" y="0" width="280" height="120" rx="12" fill="none" stroke="#27272A" stroke-width="1"/>
  <text x="140" y="36" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="12" font-weight="600" letter-spacing="2" fill="#FF6B35">BENCHMARK 提交</text>
  <text x="140" y="86" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="48" font-weight="900" fill="#FF6B35">147</text>
  <text x="140" y="108" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="12" fill="#71717A">次迭代</text>

  <rect x="308" y="0" width="280" height="120" rx="12" fill="#15151F"/>
  <rect x="308" y="0" width="280" height="120" rx="12" fill="none" stroke="#27272A" stroke-width="1"/>
  <text x="448" y="36" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="12" font-weight="600" letter-spacing="2" fill="#8B5CF6">工具调用</text>
  <text x="448" y="86" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="48" font-weight="900" fill="#8B5CF6">1959</text>
  <text x="448" y="108" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="12" fill="#71717A">次</text>

  <rect x="616" y="0" width="280" height="120" rx="12" fill="#15151F"/>
  <rect x="616" y="0" width="280" height="120" rx="12" fill="none" stroke="#27272A" stroke-width="1"/>
  <text x="756" y="36" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="12" font-weight="600" letter-spacing="2" fill="#06B6D4">运行时长</text>
  <text x="756" y="86" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="48" font-weight="900" fill="#06B6D4">24h</text>
  <text x="756" y="108" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="12" fill="#71717A">连续</text>
</g>

<!-- Footer -->
<g transform="translate(64, 920)">
  <text x="0" y="0" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="500" fill="#F97316">▶ 起点 1 个无法运行的 Triton 骨架,终点 9.4× 加速</text>
  <text x="0" y="28" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="14" font-weight="400" fill="#A1A1AA">硬件加速比从 7.6% 推进至 71.3% —— 全程零人工介入</text>
</g>

<g transform="translate(64, 1000)">
  <text x="0" y="0" font-family="SF Mono, JetBrains Mono, IBM Plex Mono, Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#71717A">CARD 03/03 · END</text>
</g>
</svg>
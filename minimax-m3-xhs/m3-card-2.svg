  <text x="140" y="140" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="80" font-weight="900" fill="url(#orangeGrad)" letter-spacing="-2">12h</text>
  <text x="140" y="175" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="14" font-weight="500" fill="#A1A1AA">零人工介入</text>

  <!-- 18 commits -->
  <rect x="308" y="0" width="280" height="200" rx="16" fill="#15151F" filter="url(#shadow)"/>
  <rect x="308" y="0" width="280" height="200" rx="16" fill="none" stroke="#8B5CF6" stroke-width="2"/>
  <text x="448" y="50" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="14" font-weight="600" letter-spacing="2" fill="#8B5CF6">代码提交</text>
  <text x="448" y="140" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="80" font-weight="900" fill="#8B5CF6" letter-spacing="-2">18</text>
  <text x="448" y="175" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="14" font-weight="500" fill="#A1A1AA">commits</text>

  <!-- 23 charts -->
  <rect x="616" y="0" width="280" height="200" rx="16" fill="#15151F" filter="url(#shadow)"/>
  <rect x="616" y="0" width="280" height="200" rx="16" fill="none" stroke="#06B6D4" stroke-width="2"/>
  <text x="756" y="50" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="14" font-weight="600" letter-spacing="2" fill="#06B6D4">实验图表</text>
  <text x="756" y="140" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="80" font-weight="900" fill="#06B6D4" letter-spacing="-2">23</text>
  <text x="756" y="175" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="14" font-weight="500" fill="#A1A1AA">figures</text>
</g>


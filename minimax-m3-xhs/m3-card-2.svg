<!-- Paper info -->
<g transform="translate(64, 850)">
  <text x="0" y="0" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="18" font-weight="500" fill="#F5F5F7">论文:Learning Dynamics of LLM Finetuning</text>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
<defs>
  <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#FF6B35"/>
    <stop offset="100%" stop-color="#FBBF24"/>
  </linearGradient>
  <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#8B5CF6"/>
    <stop offset="100%" stop-color="#FF6B35"/>
  </linearGradient>
  <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#06B6D4"/>
    <stop offset="100%" stop-color="#8B5CF6"/>
  </linearGradient>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#15151F"/>
    <stop offset="100%" stop-color="#050509"/>
  </linearGradient>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
    <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity=".5"/>
  </filter>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#27272A" stroke-width="0.5" opacity="0.4"/>
  </pattern>
  
</defs>
<rect width="1024" height="1024" fill="#0A0A14"/>
<rect width="1024" height="1024" fill="url(#grid)" opacity="0.3"/>

<g transform="translate(64,64)">
  <rect x="0" y="0" width="6" height="36" fill="#FF6B35"/>
  <text x="20" y="20" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" letter-spacing="3" fill="#F97316">MINIMAX · M3 RELEASE</text>
  <text x="20" y="34" font-family="SF Mono, JetBrains Mono, IBM Plex Mono, Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#71717A">2026.06 · MODEL DROP</text>
</g>

<!-- Title -->
<g transform="translate(64, 180)">
  <text x="0" y="0" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" letter-spacing="3" fill="#FF6B35">CARD 01 · 智能体能力</text>
  <text x="0" y="60" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="56" font-weight="900" fill="#F5F5F7" letter-spacing="-2">BrowseComp 评测</text>
  <text x="0" y="120" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="28" font-weight="400" fill="#A1A1AA">M3 跑赢 Opus 4.7,领先 4.2 分</text>
</g>

<!-- Big focal number + vs -->
<g transform="translate(64, 380)">
  <!-- M3 card -->
  <rect x="0" y="0" width="416" height="280" rx="16" fill="#FF6B35" opacity="0.12" filter="url(#shadow)"/>
  <rect x="0" y="0" width="416" height="280" rx="16" fill="none" stroke="#FF6B35" stroke-width="2"/>
  <text x="208" y="60" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" letter-spacing="2" fill="#FF6B35">minimax M3</text>
  <text x="208" y="200" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="160" font-weight="900" fill="url(#orangeGrad)" letter-spacing="-4">83.5</text>
  <text x="208" y="240" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" fill="#FF6B35">🥇 第 1</text>

  <!-- VS -->
  <g transform="translate(432, 140)">
    <text x="32" y="0" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="36" font-weight="300" fill="#71717A">VS</text>
    <line x1="0" y1="20" x2="64" y2="20" stroke="#27272A" stroke-width="1"/>
  </g>

  <!-- Opus 4.7 card -->
  <rect x="544" y="0" width="416" height="280" rx="16" fill="#15151F" filter="url(#shadow)"/>
  <rect x="544" y="0" width="416" height="280" rx="16" fill="none" stroke="#27272A" stroke-width="1"/>
  <text x="752" y="60" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" letter-spacing="2" fill="#8B5CF6">Opus 4.7</text>
  <text x="752" y="200" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="160" font-weight="900" fill="#8B5CF6" letter-spacing="-4">79.3</text>
  <text x="752" y="240" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="600" fill="#71717A">第 2</text>
</g>

<!-- Bar comparison -->
<g transform="translate(64, 700)">
  <text x="0" y="0" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="14" font-weight="600" letter-spacing="2" fill="#71717A">全模型对比</text>

  <g transform="translate(0, 30)">
    <text x="0" y="20" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="500" fill="#F5F5F7">minimax M3</text>
    <rect x="180" y="6" width="600" height="22" rx="4" fill="#27272A"/>
    <rect x="180" y="6" width="600" height="22" rx="4" fill="url(#orangeGrad)"/>
    <text x="800" y="22" font-family="SF Mono, JetBrains Mono, IBM Plex Mono, Menlo, Consolas, monospace" font-size="18" font-weight="700" fill="#FF6B35">83.5</text>
  </g>

  <g transform="translate(0, 64)">
    <text x="0" y="20" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="500" fill="#A1A1AA">Opus 4.7</text>
    <rect x="180" y="6" width="600" height="22" rx="4" fill="#27272A"/>
    <rect x="180" y="6" width="569" height="22" rx="4" fill="#8B5CF6"/>
    <text x="800" y="22" font-family="SF Mono, JetBrains Mono, IBM Plex Mono, Menlo, Consolas, monospace" font-size="18" font-weight="700" fill="#8B5CF6">79.3</text>
  </g>

  <g transform="translate(0, 98)">
    <text x="0" y="20" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="500" fill="#A1A1AA">GPT-5.5</text>
    <rect x="180" y="6" width="600" height="22" rx="4" fill="#27272A"/>
    <rect x="180" y="6" width="513" height="22" rx="4" fill="#06B6D4"/>
    <text x="800" y="22" font-family="SF Mono, JetBrains Mono, IBM Plex Mono, Menlo, Consolas, monospace" font-size="18" font-weight="700" fill="#06B6D4">71.5</text>
  </g>

  <g transform="translate(0, 132)">
    <text x="0" y="20" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="500" fill="#A1A1AA">Claude 4 Sonnet</text>
    <rect x="180" y="6" width="600" height="22" rx="4" fill="#27272A"/>
    <rect x="180" y="6" width="395" height="22" rx="4" fill="#FBBF24"/>
    <text x="800" y="22" font-family="SF Mono, JetBrains Mono, IBM Plex Mono, Menlo, Consolas, monospace" font-size="18" font-weight="700" fill="#FBBF24">55.0</text>
  </g>
</g>

<!-- Footer note -->
<g transform="translate(64, 940)">
  <text x="0" y="0" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="500" fill="#FF6B35">▶ 首个 BrowseComp 上 80 分的国产模型</text>
</g>
</svg>
  <rect x="0" y="0" width="90" height="28" rx="14" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.6"/>
  <text x="45.0" y="18" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="12" font-weight="600" fill="#06B6D4">原生多模态</text>
</g>
  <g transform="translate(360,0)">
  <rect x="0" y="0" width="138" height="28" rx="14" fill="#8B5CF6" opacity="0.18"/>
  <rect x="0" y="0" width="138" height="28" rx="14" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.6"/>
  <text x="69.0" y="18" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="12" font-weight="600" fill="#8B5CF6">前沿 Coding</text>
</g>
  <g transform="translate(540,0)">
  <rect x="0" y="0" width="78" height="28" rx="14" fill="#10B981" opacity="0.18"/>
  <rect x="0" y="0" width="78" height="28" rx="14" fill="none" stroke="#10B981" stroke-width="1" opacity="0.6"/>
  <text x="39.0" y="18" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="12" font-weight="600" fill="#10B981">即将开源</text>
</g>
</g>

<!-- Bottom -->
<g transform="translate(64, 940)">
  <text x="0" y="0" font-family="SF Mono, JetBrains Mono, IBM Plex Mono, Menlo, Consolas, monospace" font-size="12" letter-spacing="2" fill="#71717A">▶ POSTTRAINBENCH · ICLR 12H · CUDA 9.4×</text>
  <text x="896" y="0" text-anchor="end" font-family="SF Mono, JetBrains Mono, IBM Plex Mono, Menlo, Consolas, monospace" font-size="12" letter-spacing="2" fill="#71717A">2026.06</text>

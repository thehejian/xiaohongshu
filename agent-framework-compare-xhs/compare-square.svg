<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
<defs>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#FAF7F2"/>
    <stop offset="100%" stop-color="#F3F0E8"/>
  </linearGradient>
  <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="100%" stop-color="#A78BFA"/>
  </linearGradient>
  <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#FB923C"/>
    <stop offset="100%" stop-color="#F97316"/>
  </linearGradient>
  <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#60A5FA"/>
    <stop offset="100%" stop-color="#2563EB"/>
  </linearGradient>
  <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#FB7185"/>
    <stop offset="100%" stop-color="#F43F5E"/>
  </linearGradient>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="10" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="cardShadow" x="-10%" y="-10%" width="125%" height="125%">
    <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000" flood-opacity="0.1"/>
  </filter>
</defs>

<rect width="1024" height="1024" fill="url(#bgGrad)"/>

<circle cx="120" cy="120" r="140" fill="#7C3AED" opacity="0.04"/>
<circle cx="904" cy="904" r="180" fill="#7C3AED" opacity="0.04"/>

<!-- Eyebrow -->
<g transform="translate(80, 60)">
  <rect x="0" y="0" width="10" height="44" rx="5" fill="#7C3AED"/>
  <text x="28" y="18" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="800" letter-spacing="4" fill="#7C3AED">AI AGENT FRAMEWORK</text>
  <text x="28" y="44" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="14" fill="#94A3B8">N8N · Dify · 扣子 三选一</text>
</g>

<!-- Hero title -->
<g transform="translate(80, 150)">
  <text x="0" y="0" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="92" font-weight="900" fill="#0F172A" letter-spacing="-4" filter="url(#glow)">AI Agent</text>
  <text x="0" y="100" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="92" font-weight="900" fill="url(#titleGrad)" letter-spacing="-4">框架对比</text>
</g>

<!-- Subtitle -->
<g transform="translate(80, 300)">

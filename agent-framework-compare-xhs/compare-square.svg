<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
<defs>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#FAF7F2"/>
    <stop offset="100%" stop-color="#F3F0E8"/>
  </linearGradient>
  <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="100%" stop-color="#A78BFA"/>
  </linearGradient>
  <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#FB923C"/>
    <stop offset="100%" stop-color="#EA580C"/>
  </linearGradient>
  <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#60A5FA"/>
    <stop offset="100%" stop-color="#2563EB"/>
  </linearGradient>
  <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#FB7185"/>
    <stop offset="100%" stop-color="#F43F5E"/>
  </linearGradient>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="12" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="shadow" x="-10%" y="-10%" width="125%" height="125%">
    <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.1"/>
  </filter>
  <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="130%">
    <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000" flood-opacity="0.12"/>
  </filter>
</defs>

<rect width="1024" height="1024" fill="url(#bgGrad)"/>

<!-- Decorative background circles -->
<circle cx="100" cy="100" r="160" fill="#7C3AED" opacity="0.05"/>
<circle cx="924" cy="924" r="200" fill="#7C3AED" opacity="0.05"/>
<circle cx="824" cy="200" r="100" fill="#EA580C" opacity="0.03"/>
<circle cx="200" cy="824" r="120" fill="#2563EB" opacity="0.03"/>

<!-- Eyebrow with number badge -->
<g transform="translate(80, 50)">
  <rect x="0" y="0" width="52" height="52" rx="14" fill="#7C3AED" opacity="0.12"/>
  <text x="26" y="34" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="22" font-weight="900" fill="#7C3AED">4</text>
  <rect x="64" y="0" width="10" height="52" rx="5" fill="#7C3AED"/>
  <text x="86" y="20" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="800" letter-spacing="4" fill="#7C3AED">AI AGENT FRAMEWORK</text>
  <text x="86" y="44" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="14" fill="#94A3B8">N8N · Dify · Coze 四选一</text>
</g>

<!-- Hero title — HUGE with glow -->
<g transform="translate(80, 140)">
  <text x="0" y="0" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="100" font-weight="900" fill="#0F172A" letter-spacing="-5" filter="url(#glow)">AI Agent</text>
  <text x="0" y="110" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="100" font-weight="900" fill="url(#titleGrad)" letter-spacing="-5">框架对比</text>
</g>

<!-- Subtitle -->
<g transform="translate(80, 295)">
  <text x="0" y="0" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="28" font-weight="600" fill="#475569">看完这张图，选对工具不踩坑 👇</text>
</g>

<!-- Three platform cards with BIG logos — horizontal row -->
<!-- N8N card -->
<g transform="translate(80, 370)" filter="url(#cardShadow)">
  <rect x="0" y="0" width="270" height="380" rx="28" fill="white"/>
  <!-- Gradient top bar -->
  <rect x="0" y="0" width="270" height="12" rx="28" fill="url(#orangeGrad)"/>
  <rect x="0" y="12" width="270" height="12" rx="0" fill="url(#orangeGrad)"/>
  
  <!-- BIG logo badge -->
  <circle cx="135" cy="105" r="60" fill="#FFF7ED"/>
  <g transform="translate(135,105) scale(2.5)">
    <!-- N8N chain link: two interlocking ovals -->
    <ellipse cx="-14" cy="0" rx="16" ry="20" fill="none" stroke="#EA580C" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="14" cy="0" rx="16" ry="20" fill="none" stroke="#EA580C" stroke-width="5" stroke-linecap="round"/>
    <!-- Overlap fill -->
    <path d="M -6 -16 A 8 16 0 0 1 -6 16 L 6 16 A 8 16 0 0 1 6 -16 Z" fill="#EA580C" opacity="0.15"/>
  </g>
  
  <!-- Number badge -->
  <circle cx="220" cy="55" r="22" fill="#EA580C"/>
  <text x="220" y="63" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="20" font-weight="900" fill="white">1</text>
  
  <!-- Platform name — BIG -->
  <text x="135" y="195" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="52" font-weight="900" fill="#EA580C">N8N</text>
  <text x="135" y="225" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="18" fill="#94A3B8">工作流自动化</text>
  
  <line x1="35" y1="255" x2="235" y2="255" stroke="#E2E8F0" stroke-width="1"/>
  
  <!-- Features -->
  <g transform="translate(35, 275)">
    <rect x="0" y="0" width="8" height="28" rx="4" fill="#EA580C"/>
    <text x="18" y="21" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#0F172A">开源可自托管</text>
  </g>
  <g transform="translate(35, 315)">
    <rect x="0" y="0" width="8" height="28" rx="4" fill="#EA580C"/>
    <text x="18" y="21" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#0F172A">500+ 集成节点</text>
  </g>
  <g transform="translate(35, 355)">
    <rect x="0" y="0" width="8" height="28" rx="4" fill="#EA580C"/>
    <text x="18" y="21" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#0F172A">上手难度：中等</text>
  </g>
</g>

<!-- Dify card -->
<g transform="translate(377, 370)" filter="url(#cardShadow)">
  <rect x="0" y="0" width="270" height="380" rx="28" fill="white"/>
  <rect x="0" y="0" width="270" height="12" rx="28" fill="url(#blueGrad)"/>
  <rect x="0" y="12" width="270" height="12" rx="0" fill="url(#blueGrad)"/>
  
  <circle cx="135" cy="105" r="60" fill="#EFF6FF"/>
  <g transform="translate(135,105) scale(2.5)">
    <!-- Dify wave: three connected curves -->
    <path d="M -20 -3 C -20 -12, -5 -12, -5 -3 C -5 6, 5 6, 5 -3 C 5 -12, 20 -12, 20 -3"
          fill="none" stroke="#2563EB" stroke-width="6" stroke-linecap="round"/>
    <!-- Three dots at key points -->
    <circle cx="-5" cy="-3" r="4" fill="#2563EB"/>
    <circle cx="5" cy="-3" r="4" fill="#2563EB"/>
    <circle cx="20" cy="-3" r="4" fill="#2563EB"/>
  </g>
  
  <circle cx="220" cy="55" r="22" fill="#2563EB"/>
  <text x="220" y="63" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="20" font-weight="900" fill="white">2</text>
  
  <text x="135" y="195" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="52" font-weight="900" fill="#2563EB">Dify</text>
  <text x="135" y="225" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="18" fill="#94A3B8">LLM 应用开发</text>
  
  <line x1="35" y1="255" x2="235" y2="255" stroke="#E2E8F0" stroke-width="1"/>
  
  <g transform="translate(35, 275)">
    <rect x="0" y="0" width="8" height="28" rx="4" fill="#2563EB"/>
    <text x="18" y="21" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#0F172A">开源可自部署</text>
  </g>
  <g transform="translate(35, 315)">
    <rect x="0" y="0" width="8" height="28" rx="4" fill="#2563EB"/>
    <text x="18" y="21" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#0F172A">RAG + Agent 工作流</text>
  </g>
  <g transform="translate(35, 355)">
    <rect x="0" y="0" width="8" height="28" rx="4" fill="#2563EB"/>
    <text x="18" y="21" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#0F172A">上手难度：中等</text>
  </g>
</g>

<!-- Coze card -->
<g transform="translate(674, 370)" filter="url(#cardShadow)">
  <rect x="0" y="0" width="270" height="380" rx="28" fill="white"/>
  <rect x="0" y="0" width="270" height="12" rx="28" fill="url(#roseGrad)"/>
  <rect x="0" y="12" width="270" height="12" rx="0" fill="url(#roseGrad)"/>
  
  <circle cx="135" cy="105" r="60" fill="#FFF1F2"/>
  <g transform="translate(135,105) scale(2.5)">
    <!-- Coze speech bubble -->
    <rect x="-22" y="-18" width="44" height="32" rx="8" fill="#F43F5E"/>
    <!-- Tail pointing down-left -->
    <polygon points="-10,10 -22,22 -6,14" fill="#F43F5E"/>
    <!-- Three white dots -->
    <circle cx="-8" cy="-4" r="3" fill="white"/>
    <circle cx="2" cy="-4" r="3" fill="white"/>
    <circle cx="12" cy="-4" r="3" fill="white"/>
  </g>
  
  <circle cx="220" cy="55" r="22" fill="#F43F5E"/>
  <text x="220" y="63" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="20" font-weight="900" fill="white">3</text>
  
  <text x="135" y="195" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="52" font-weight="900" fill="#F43F5E">扣子</text>
  <text x="135" y="225" text-anchor="middle" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="18" fill="#94A3B8">插件生态 Bot</text>
  
  <line x1="35" y1="255" x2="235" y2="255" stroke="#E2E8F0" stroke-width="1"/>
  
  <g transform="translate(35, 275)">
    <rect x="0" y="0" width="8" height="28" rx="4" fill="#F43F5E"/>
    <text x="18" y="21" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#0F172A">闭源 SaaS 平台</text>
  </g>
  <g transform="translate(35, 315)">
    <rect x="0" y="0" width="8" height="28" rx="4" fill="#F43F5E"/>
    <text x="18" y="21" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#0F172A">上百插件 + 多模态</text>
  </g>
  <g transform="translate(35, 355)">
    <rect x="0" y="0" width="8" height="28" rx="4" fill="#F43F5E"/>
    <text x="18" y="21" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#0F172A">上手难度：低</text>
  </g>
</g>

<!-- Bottom summary bar -->
<g transform="translate(80, 800)">
  <rect x="0" y="0" width="864" height="72" rx="18" fill="#0F172A" opacity="0.04"/>
  <text x="30" y="30" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="800" fill="#EA580C">🟠 N8N → 自动化流程</text>
  <text x="340" y="30" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="800" fill="#2563EB">🔵 Dify → LLM 应用 + 知识库</text>
  <text x="680" y="30" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" font-weight="800" fill="#F43F5E">🔴 扣子 → Bot + 快速上线</text>
  <text x="30" y="56" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="14" fill="#94A3B8">三者组合用也不冲突：N8N 底层 + Dify LLM 层 + 扣子前端</text>
</g>

<!-- Footer -->
<g transform="translate(80, 925)">
  <text x="0" y="0" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="16" fill="#94A3B8">#AI Agent · #N8N · #Dify · #扣子 · #Coze · #LLM · #AI工具 · #自动化</text>
</g>
</svg>
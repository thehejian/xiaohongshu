  <text x="30" y="28" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="15" font-weight="800" fill="#F97316">🟠 N8N → 自动化流程</text>
  <text x="340" y="28" font-family="PingFang SC, Heiti SC, STHeiti, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="15" font-weight="800" fill="#2563EB">🔵 Dify → LLM 应用 + 知识库</text>

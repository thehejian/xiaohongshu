          fill="none" stroke="#2563EB" stroke-width="s*0.14" stroke-linecap="round"/>
    <circle cx="-s*0.15" cy="-s*0.05" r="s*0.06" fill="#2563EB"/>
    <circle cx="s*0.15" cy="-s*0.05" r="s*0.06" fill="#2563EB"/>

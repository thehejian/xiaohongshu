<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for top bar -->
    <linearGradient id="gradTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <!-- Gradient for card shadow -->
    <linearGradient id="gradCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F9FAFB"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#8B5CF6" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background with subtle pattern -->
  <rect width="1024" height="1024" fill="#FAF5FF"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="60" fill="#8B5CF6" opacity="0.05"/>
  <circle cx="924" cy="100" r="80" fill="#8B5CF6" opacity="0.05"/>
  <circle cx="100" cy="924" r="70" fill="#8B5CF6" opacity="0.05"/>
  <circle cx="924" cy="924" r="50" fill="#8B5CF6" opacity="0.05"/>
  
  <!-- Top accent bar -->
  <rect x="0" y="0" width="1024" height="16" fill="url(#gradTop)"/>
  
  <!-- Main card with shadow -->
  <rect x="80" y="80" width="864" height="864" rx="40" fill="url(#gradCard)" filter="url(#shadow)"/>
  
  <!-- Number badge -->
  <circle cx="160" cy="160" r="48" fill="url(#gradTop)"/>
  <text x="160" y="178" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF">05</text>
  
  <!-- Icon in circle -->
  <circle cx="512" cy="320" r="120" fill="#8B5CF6" opacity="0.1"/>
  <text x="512" y="380" text-anchor="middle" font-size="100">🤖</text>
  
  <!-- Tool name - BIG -->
  <text x="512" y="520" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" fill="#1F2937">Jenni</text>
  
  <!-- Tagline with accent -->
  <text x="512" y="600" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="600" fill="#8B5CF6">AI写作</text>
  
  <!-- Divider line -->
  <line x1="312" y1="640" x2="712" y2="640" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  
  <!-- Description -->
  <text x="512" y="700" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#6B7280">边写边补全</text>
  
  <!-- Bottom accent bar -->
  <rect x="80" y="880" width="864" height="64" rx="32" fill="url(#gradTop)" opacity="0.1"/>
  
  <!-- Small decorative dots -->
  <circle cx="200" cy="810" r="8" fill="#8B5CF6" opacity="0.2"/>
  <circle cx="230" cy="810" r="8" fill="#8B5CF6" opacity="0.2"/>
  <circle cx="260" cy="810" r="8" fill="#8B5CF6" opacity="0.2"/>
  <circle cx="764" cy="810" r="8" fill="#8B5CF6" opacity="0.2"/>
  <circle cx="794" cy="810" r="8" fill="#8B5CF6" opacity="0.2"/>
  <circle cx="824" cy="810" r="8" fill="#8B5CF6" opacity="0.2"/>
</svg>
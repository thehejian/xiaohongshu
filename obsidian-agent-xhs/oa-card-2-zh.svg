<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="100%" stop-color="#F5F0E8"/>
    </linearGradient>
    <linearGradient id="bigG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <circle cx="700" cy="80" r="60" fill="#D1FAE5" opacity="0.4"/>
  <circle cx="80" cy="720" r="50" fill="#EDE9FE" opacity="0.4"/>
  <rect x="40" y="40" width="720" height="100" rx="50" fill="#D1FAE5" filter="url(#shadow)"/>
  <text x="400" y="108" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="48" font-weight="900" fill="#1E293B">AI 管家接管第二大脑</text>
  <g transform="translate(40, 180)">
    <rect x="0" y="0" width="720" height="170" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
    <text x="360" y="50" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="26" font-weight="800" fill="url(#bigG)">Agents Read, Humans Write</text>
    <text x="40" y="95" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="18" fill="#1E293B">AI 读取你的 vault 做语义搜索、联想</text>
    <text x="40" y="130" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="18" fill="#1E293B">但从不替你写——思考权永远在你手上</text>
    <text x="40" y="163" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="18" fill="#64748B">这才是 AI × 知识管理正确的分工</text>
  </g>
  <g transform="translate(40, 390)">
    <rect x="0" y="0" width="340" height="160" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="0" y="0" width="340" height="50" rx="20" fill="#DBEAFE"/>
    <text x="170" y="33" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#2563EB">CLI 打通</text>
    <text x="20" y="80" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" fill="#64748B">Obsidian 1.12 CLI 发布</text>
    <text x="20" y="110" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" fill="#64748B">搜索比 grep 快 54 倍</text>
    <text x="20" y="140" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" fill="#64748B">Agent 原生读写 vault</text>
  </g>
  <g transform="translate(420, 390)">
    <rect x="0" y="0" width="340" height="160" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="0" y="0" width="340" height="50" rx="20" fill="#EDE9FE"/>
    <text x="170" y="33" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#7C3AED">MCP 桥梁</text>
    <text x="20" y="80" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" fill="#64748B">obsidian-claude-code-mcp</text>
    <text x="20" y="110" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" fill="#64748B">WebSocket 桥接</text>
    <text x="20" y="140" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" fill="#64748B">无需 symlink 或 cd</text>
  </g>
  <g transform="translate(40, 590)">
    <rect x="0" y="0" width="340" height="160" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="0" y="0" width="340" height="50" rx="20" fill="#D1FAE5"/>
    <text x="170" y="33" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#059669">QMD 同步</text>
    <text x="20" y="80" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" fill="#64748B">Claude 会话自动导出</text>
    <text x="20" y="110" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" fill="#64748B">关闭即写回 vault</text>
    <text x="20" y="140" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" fill="#64748B">token 减少 60%+</text>
  </g>
  <g transform="translate(420, 590)">
    <rect x="0" y="0" width="340" height="160" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="0" y="0" width="340" height="50" rx="20" fill="#FCE7F3"/>
    <text x="170" y="33" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#EC4899">生态集群</text>
    <text x="20" y="80" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" fill="#64748B">Copilot · SmartConnections</text>
    <text x="20" y="110" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" fill="#64748B">Claudian · Agent Client</text>
    <text x="20" y="140" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" fill="#64748B">全场景覆盖</text>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#141B33"/>
      <stop offset="100%" stop-color="#0B1027"/>
    </radialGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <circle cx="80" cy="80" r="70" fill="#1E3A5F" opacity="0.5"/>
  <circle cx="720" cy="720" r="60" fill="#3B1F6E" opacity="0.4"/>
  <rect x="40" y="40" width="720" height="100" rx="50" fill="#1E3A5F" filter="url(#shadow)"/>
  <text x="400" y="108" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="48" font-weight="900" fill="#E2E8F0">The Verdict</text>
  <g transform="translate(40, 180)">
    <rect x="0" y="0" width="720" height="100" rx="20" fill="#1A2340" filter="url(#shadow)"/>
    <rect x="0" y="0" width="14" height="100" rx="7" fill="#34D399"/>
    <text x="40" y="40" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#E2E8F0">The chat-in-sidepanel was wrong</text>
    <text x="40" y="72" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" fill="#8892B0">Community rejected AI-as-chatbot in the vault</text>
  </g>
  <g transform="translate(40, 310)">
    <rect x="0" y="0" width="720" height="100" rx="20" fill="#1A2340" filter="url(#shadow)"/>
    <rect x="0" y="0" width="14" height="100" rx="7" fill="#60A5FA"/>
    <text x="40" y="40" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#E2E8F0">The winner: invisible background agent</text>
    <text x="40" y="72" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" fill="#8892B0">Semantic search, link suggestions, session recall</text>
  </g>
  <g transform="translate(40, 440)">
    <rect x="0" y="0" width="720" height="100" rx="20" fill="#1A2340" filter="url(#shadow)"/>
    <rect x="0" y="0" width="14" height="100" rx="7" fill="#A78BFA"/>
    <text x="40" y="40" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#E2E8F0">Infrastructure is ready</text>
    <text x="40" y="72" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" fill="#8892B0">CLI + MCP + QMD = production-ready pipeline</text>
  </g>
  <g transform="translate(40, 570)">
    <rect x="0" y="0" width="720" height="100" rx="20" fill="#1A2340" filter="url(#shadow)"/>
    <rect x="0" y="0" width="14" height="100" rx="7" fill="#F472B6"/>
    <text x="40" y="40" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#E2E8F0">Obsidian isn't replaced — it's unlocked</text>
    <text x="40" y="72" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" fill="#8892B0">The killer app hasn't shipped yet. It will.</text>
  </g>
  <g transform="translate(40, 720)">
    <rect x="0" y="0" width="720" height="50" rx="25" fill="#60A5FA" opacity="0.15"/>
    <text x="360" y="33" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#60A5FA">Yes, 有搞头 — and you're early enough to ride it</text>
  </g>
</svg>
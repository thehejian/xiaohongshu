      <text x="170" y="32" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="26" font-weight="800" fill="#2563EB">CLI 打通</text>
      <text x="170" y="62" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="17" fill="#1D4ED8">搜索快 grep 54 倍</text>
    </g>

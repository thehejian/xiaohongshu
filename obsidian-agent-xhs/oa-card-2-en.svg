<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#141B33"/>
      <stop offset="100%" stop-color="#0B1027"/>
    </radialGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <circle cx="80" cy="80" r="70" fill="#1E3A5F" opacity="0.4"/>
  <circle cx="720" cy="720" r="60" fill="#3B1F6E" opacity="0.4"/>
  <rect x="40" y="40" width="720" height="100" rx="50" fill="#3B1F6E" filter="url(#shadow)"/>
  <text x="400" y="108" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="44" font-weight="900" fill="#E2E8F0">How It Works</text>
  <g transform="translate(40, 175)">
    <rect x="0" y="0" width="720" height="90" rx="20" fill="#1A2340" filter="url(#shadow)"/>
    <circle cx="40" cy="45" r="22" fill="#60A5FA"/>
    <text x="40" y="51" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#FFF">1</text>
    <text x="80" y="40" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#E2E8F0">Obsidian CLI — 54x faster than grep</text>
    <text x="80" y="70" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="15" fill="#8892B0">Native vault search from any Agent</text>
  </g>
  <g transform="translate(40, 290)">
    <rect x="0" y="0" width="720" height="90" rx="20" fill="#1A2340" filter="url(#shadow)"/>
    <circle cx="40" cy="45" r="22" fill="#A78BFA"/>
    <text x="40" y="51" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#FFF">2</text>
    <text x="80" y="40" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#E2E8F0">MCP Server connects the dots</text>
    <text x="80" y="70" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="15" fill="#8892B0">WebSocket bridge, no symlink needed</text>
  </g>
  <g transform="translate(40, 405)">
    <rect x="0" y="0" width="720" height="90" rx="20" fill="#1A2340" filter="url(#shadow)"/>
    <circle cx="40" cy="45" r="22" fill="#34D399"/>
    <text x="40" y="51" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#FFF">3</text>
    <text x="80" y="40" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#E2E8F0">QMD syncs sessions to vault</text>
    <text x="80" y="70" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="15" fill="#8892B0">Claude output -> markdown, 60% token saved</text>
  </g>
  <g transform="translate(40, 520)">
    <rect x="0" y="0" width="720" height="90" rx="20" fill="#1A2340" filter="url(#shadow)"/>
    <circle cx="40" cy="45" r="22" fill="#F472B6"/>
    <text x="40" y="51" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#FFF">4</text>
    <text x="80" y="40" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#E2E8F0">Agent uses vault as memory</text>
    <text x="80" y="70" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="15" fill="#8892B0">Semantic search + link suggestions + recall</text>
  </g>
  <g transform="translate(40, 650)">
    <rect x="0" y="0" width="720" height="100" rx="50" fill="#60A5FA" opacity="0.1" stroke="#60A5FA" stroke-width="2"/>
    <text x="360" y="45" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#60A5FA">CLI + MCP + QMD = The Trinity</text>
    <text x="360" y="78" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" fill="#8892B0">Three tools, one seamless workflow</text>
  </g>

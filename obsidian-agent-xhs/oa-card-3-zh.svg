<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="100%" stop-color="#F5F0E8"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <circle cx="80" cy="80" r="70" fill="#DBEAFE" opacity="0.5"/>
  <circle cx="720" cy="720" r="60" fill="#FEF3C7" opacity="0.3"/>
  <rect x="40" y="40" width="720" height="100" rx="50" fill="#DBEAFE" filter="url(#shadow)"/>
  <text x="400" y="108" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="48" font-weight="900" fill="#1E293B">三组数据告诉你答案</text>
  <g transform="translate(40, 180)">
    <rect x="0" y="0" width="720" height="110" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
    <text x="40" y="55" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#2563EB">54x</text>
    <text x="160" y="55" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1E293B">CLI 搜索速度 vs grep</text>
    <text x="40" y="85" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" fill="#64748B">4663 文件、16GB vault 实测：0.26s vs 15.6s</text>
    <text x="40" y="105" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" fill="#64748B" font-style="italic">来源: @drrobcincotta</text>
  </g>
  <g transform="translate(40, 320)">
    <rect x="0" y="0" width="720" height="110" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
    <text x="40" y="55" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#7C3AED">60%+</text>
    <text x="190" y="55" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1E293B">Token 用量降低</text>
    <text x="40" y="85" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" fill="#64748B">QMD 方案实测：上下文效率大幅提升</text>
    <text x="40" y="105" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" fill="#64748B" font-style="italic">来源: Kevin Lee / Shopify CEO 团队</text>
  </g>
  <g transform="translate(40, 460)">
    <rect x="0" y="0" width="720" height="110" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
    <text x="40" y="55" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#059669">6+</text>
    <text x="150" y="55" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1E293B">AI 插件集群</text>
    <text x="40" y="85" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="16" fill="#64748B">Copilot · Smart Connections · Claudian · Agent Client · Claude Sidebar · Nexus</text>
  </g>
  <g transform="translate(40, 620)">
    <rect x="0" y="0" width="720" height="100" rx="50" fill="#E0E7FF" stroke="#4F46E5" stroke-width="2"/>
    <text x="360" y="45" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#4F46E5">基础设施就位，生态已经爆发</text>
    <text x="360" y="80" text-anchor="middle" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="18" fill="#64748B">现在上车，时机刚好 🚀</text>
  </g>
